<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>E-Mobility CRM | Executivo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFBFC;--s1:#FFFFFF;--s2:#F8FAFB;--s3:#F3F4F6;
  --brd:#E5E7EB;--brd-light:#F0F1F3;
  --green:#10B981;--green-bg:#ECFDF5;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --text:#1F2937;--muted:#6B7280;--muted2:#9CA3AF;
  --fh:'Plus Jakarta Sans',sans-serif;--fb:'Lato',sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.6}
.wrap{max-width:1600px;margin:0 auto;padding:24px 32px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:16px}
.hdr-t{font-family:var(--fh);font-size:2rem;font-weight:900;color:var(--text)}
.hdr-s{font-size:.75rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:.72rem;font-weight:600;border:1px solid;background:#fff}
.p-ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.p-err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.nav-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--brd)}
.nav-tab{padding:12px 16px;background:none;border:none;color:var(--muted2);cursor:pointer;font-family:var(--fh);font-weight:600;font-size:.9rem;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.hidden{display:none}
.card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:20px;margin-bottom:20px}
.card-t{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px}
.kpi{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:18px;position:relative;overflow:hidden;transition:all .2s}
.kpi:hover{border-color:#D1D5DB;background:var(--s2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kpi.green::before{background:var(--green)}.kpi.red::before{background:var(--red)}.kpi.amber::before{background:var(--amber)}.kpi.blue::before{background:var(--blue)}
.kpi-l{font-size:.76rem;color:var(--muted2);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.kpi-v{font-family:var(--fh);font-size:2rem;font-weight:800;color:var(--text);margin-bottom:4px}
.sec{font-family:var(--fh);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:14px;margin-top:24px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--brd)}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:var(--s3);color:var(--muted);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--brd);font-size:.73rem;text-transform:uppercase}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--brd-light);color:var(--text)}
.tbl tr:hover{background:var(--s2)}
.tbl .num{text-align:right;font-family:monospace;font-weight:600}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="hdr-t">E-Mobility CRM</div>
      <div class="hdr-s">Executivo • Decisão Estratégica</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span id="status-pill" class="pill p-ok">✓ Carregando...</span>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('diretoria')">📊 Diretoria</button>
    <button class="nav-tab" onclick="switchTab('bruno')">👤 Bruno</button>
    <button class="nav-tab" onclick="switchTab('felipe')">👤 Felipe</button>
    <button class="nav-tab" onclick="switchTab('opps')">📋 Oportunidades</button>
  </div>

  <div id="diretoria" class="tab-content"><div id="diretoria-html"></div></div>
  <div id="bruno" class="tab-content hidden"><div id="bruno-html"></div></div>
  <div id="felipe" class="tab-content hidden"><div id="felipe-html"></div></div>
  <div id="opps" class="tab-content hidden"><div id="opps-html"></div></div>
</div>

<script>
const URLS = {
  bruno: './Opp Bruno.csv',
  felipe: './Opp Felipe.csv',
  snapshot: './SNAPSHOTS.csv'
};

const METAS = {bruno: 50000000, felipe: 12000000};
let DATA = {base: [], snapshot: []};

function fK(n){return !n?'R$ 0,00':('R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}))}
function parseData(d){if(!d)return null;try{const s=String(d).trim().replace(/\/0206/g,'/2026');if(!s||s.length<6)return null;const p=s.split(/[-\/]/);if(p.length<3)return null;let a,m,day;if(p[0].length===4){a=parseInt(p[0]);m=parseInt(p[1]);day=parseInt(p[2])}else{day=parseInt(p[0]);m=parseInt(p[1]);a=parseInt(p[2])}if(a<1900||a>2100||m<1||m>12||day<1||day>31)return null;const date=new Date(a,m-1,day);return date.getFullYear()===a?date:null}catch(e){return null}}
function parseBRL(v){if(!v)return 0;const s=String(v).replace(/R\$\s*/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').trim();return isNaN(parseFloat(s))?0:parseFloat(s)}

async function loadData(){
  try{
    console.log('🔄 Carregando dados...');
    const [resBruno,resFelipe,resSnap]=await Promise.all([fetch(URLS.bruno),fetch(URLS.felipe),fetch(URLS.snapshot)]);
    
    if(!resBruno.ok||!resFelipe.ok)throw new Error('CSVs não encontrados');
    
    const txtBruno=await resBruno.text();
    const txtFelipe=await resFelipe.text();
    const txtSnap=resSnap.ok?await resSnap.text():'';
    
    const dataBruno=Papa.parse(txtBruno,{header:true,skipEmptyLines:true}).data.filter(r=>r.CUSTOMER);
    const dataFelipe=Papa.parse(txtFelipe,{header:true,skipEmptyLines:true}).data.filter(r=>r.CUSTOMER);
    
    DATA.base=[...dataBruno,...dataFelipe];
    DATA.snapshot=txtSnap?Papa.parse(txtSnap,{header:true,skipEmptyLines:true}).data.filter(r=>r.CUSTOMER):[];
    
    normalize();
    render();
    document.getElementById('status-pill').textContent='✓ '+DATA.base.length+' oportunidades';
    document.getElementById('status-pill').className='pill p-ok';
  }catch(e){
    console.error(e);
    document.getElementById('status-pill').textContent='❌ Erro: '+e.message;
    document.getElementById('status-pill').className='pill p-err';
  }
}

function normalize(){
  DATA.base.forEach(r=>{
    r._val=parseBRL(r['TOTAL NET LVK (R$)']||r[' TOTAL NET LVK (R$) ']||r['TOTAL NET (R$)']||'0');
    r._vendor=(r.VENDEDOR||'').toLowerCase().trim();
    r._atua=parseData(r['DATA DA ULTIMA ATUALIZAÇÃO']||'');
    r._dias_sem_atua=!r._atua?999:Math.max(0,Math.floor((new Date()-r._atua)/(1000*60*60*24)));
    r._top10=(r['TOP 10']||'').toLowerCase()==='sim';
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
}

function render(){
  renderDiretoria();
  renderBruno();
  renderFelipe();
  renderOpps();
}

function renderDiretoria(){
  const rows=DATA.base;
  const metTotal=METAS.bruno+METAS.felipe;
  const valTotal=rows.reduce((s,r)=>s+r._val,0);
  const html=`
    <div class="sec">🎯 Números Executivos</div>
    <div class="g4">
      <div class="kpi blue">
        <div class="kpi-l">Meta Total</div>
        <div class="kpi-v">${fK(metTotal)}</div>
      </div>
      <div class="kpi green">
        <div class="kpi-l">Pipeline Total</div>
        <div class="kpi-v">${fK(valTotal)}</div>
      </div>
      <div class="kpi amber">
        <div class="kpi-l">Cobertura</div>
        <div class="kpi-v">${((valTotal/metTotal)*100).toFixed(0)}%</div>
      </div>
      <div class="kpi blue">
        <div class="kpi-l">Oportunidades</div>
        <div class="kpi-v">${rows.length}</div>
      </div>
    </div>
  `;
  document.getElementById('diretoria-html').innerHTML=html;
}

function renderBruno(){
  const rows=DATA.base.filter(r=>r._vendor.includes('bruno'));
  const valTotal=rows.reduce((s,r)=>s+r._val,0);
  const top10=rows.filter(r=>r._top10).sort((a,b)=>b._val-a._val);
  const aguEngen=rows.filter(r=>(r.STATUS||'').includes('Aguardando Engenharia'));
  
  let html=`
    <div class="sec">📊 Bruno Reis</div>
    <div class="g2">
      <div class="kpi blue">
        <div class="kpi-l">Meta Anual</div>
        <div class="kpi-v">${fK(METAS.bruno)}</div>
      </div>
      <div class="kpi green">
        <div class="kpi-l">Pipeline</div>
        <div class="kpi-v">${fK(valTotal)}</div>
      </div>
    </div>

    <div class="sec">⏳ Aguardando Engenharia</div>
    <div class="card">
      <div style="font-size:2.5rem;font-weight:900;color:var(--amber)">${aguEngen.length}</div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:16px">${fK(aguEngen.reduce((s,r)=>s+r._val,0))}</div>
      <table class="tbl">
        <tr><th>Cliente</th><th>ID</th></tr>
        ${aguEngen.map(r=>`<tr><td>${r.CUSTOMER||'-'}</td><td>${r['ID AUTOMÁTICO']||'-'}</td></tr>`).join('')}
      </table>
    </div>

    <div class="sec">🎯 Top 10 Deals</div>
    <div class="card">
      <table class="tbl">
        <tr><th>Cliente</th><th class="num">Valor</th></tr>
        ${top10.slice(0,10).map(r=>`<tr><td>${r.CUSTOMER}</td><td class="num">${fK(r._val)}</td></tr>`).join('')}
      </table>
    </div>
  `;
  document.getElementById('bruno-html').innerHTML=html;
}

function renderFelipe(){
  const rows=DATA.base.filter(r=>r._vendor.includes('felipe'));
  const valTotal=rows.reduce((s,r)=>s+r._val,0);
  const top10=rows.filter(r=>r._top10).sort((a,b)=>b._val-a._val);
  const aguEngen=rows.filter(r=>(r.STATUS||'').includes('Aguardando Engenharia'));
  
  let html=`
    <div class="sec">📊 Felipe Hanke</div>
    <div class="g2">
      <div class="kpi blue">
        <div class="kpi-l">Meta Anual</div>
        <div class="kpi-v">${fK(METAS.felipe)}</div>
      </div>
      <div class="kpi green">
        <div class="kpi-l">Pipeline</div>
        <div class="kpi-v">${fK(valTotal)}</div>
      </div>
    </div>

    <div class="sec">⏳ Aguardando Engenharia</div>
    <div class="card">
      <div style="font-size:2.5rem;font-weight:900;color:var(--amber)">${aguEngen.length}</div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:16px">${fK(aguEngen.reduce((s,r)=>s+r._val,0))}</div>
      <table class="tbl">
        <tr><th>Cliente</th><th>ID</th></tr>
        ${aguEngen.map(r=>`<tr><td>${r.CUSTOMER||'-'}</td><td>${r['ID AUTOMÁTICO']||'-'}</td></tr>`).join('')}
      </table>
    </div>

    <div class="sec">🎯 Top 10 Deals</div>
    <div class="card">
      <table class="tbl">
        <tr><th>Cliente</th><th class="num">Valor</th></tr>
        ${top10.slice(0,10).map(r=>`<tr><td>${r.CUSTOMER}</td><td class="num">${fK(r._val)}</td></tr>`).join('')}
      </table>
    </div>
  `;
  document.getElementById('felipe-html').innerHTML=html;
}

function renderOpps(){
  const rows=DATA.base.sort((a,b)=>b._val-a._val);
  const html=`
    <div class="sec">📋 Todas as Oportunidades</div>
    <div class="card">
      <table class="tbl">
        <tr><th>Cliente</th><th>Vendedor</th><th class="num">Valor</th><th>Status</th></tr>
        ${rows.map(r=>`<tr><td>${r.CUSTOMER}</td><td>${r.VENDEDOR||'-'}</td><td class="num">${fK(r._val)}</td><td>${r.STATUS||'-'}</td></tr>`).join('')}
      </table>
    </div>
  `;
  document.getElementById('opps-html').innerHTML=html;
}

loadData();
</script>
</body>
</html>
