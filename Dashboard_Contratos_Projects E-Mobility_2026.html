<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Contratos - Mobility 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Cards de Clientes */
        .client-section {
            margin-bottom: 40px;
        }

        .client-card {
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: white;
        }

        .client-card.gwm {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .client-card.renault {
            background: linear-gradient(135deg, #ffd86f 0%, #fc6262 100%);
        }

        .client-card.tc {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .client-card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-card p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .client-badge {
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Grid de KPIs */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #667eea;
        }

        .kpi-subtitle {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
        }

        /* Seção de Gráficos */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .chart-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        /* Estoque Alert */
        .stock-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .stock-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .stock-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #ddd;
        }

        .stock-item.low-stock {
            border-left-color: #f5576c;
            background: #fff5f5;
        }

        .stock-item.warning {
            border-left-color: #ffa726;
            background: #fff8f0;
        }

        .stock-item.ok {
            border-left-color: #66bb6a;
            background: #f0fff0;
        }

        .stock-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stock-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stock-name {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
        }

        /* Informações Contratuais */
        .contract-info {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .contract-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1rem;
            color: #333;
            margin-top: 5px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .charts-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard de Contratos - Mobility 2026</h1>
            <p>Acompanhamento de Contratos e Estoque de Produtos Mobility</p>
        </div>

        <div id="loading" class="loading">Carregando dados...</div>
        <div id="content" style="display: none;">
            <!-- Seções de Clientes (serão geradas dinamicamente) -->
            <div id="clients-container"></div>

            <!-- Gráficos -->
            <div class="charts-section">
                <div class="chart-card">
                    <h3>Pipeline de Status</h3>
                    <canvas id="pipelineChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Evolução - Faturamento Mensal</h3>
                    <canvas id="evolutionChart"></canvas>
                </div>
            </div>

            <!-- Estoque de Produtos Mobility -->
            <div class="stock-section">
                <h3>⚠️ Estoque de Produtos Mobility</h3>
                <div class="stock-grid" id="stock-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // Dados de estoque embutidos
        const estoqueData = [
            {produto: 'A0070230E11R11302', nome: 'CA 7.3kW ATOM', disponivel: 721, reserva: 0, totvs: 721},
            {produto: 'A0070230EHR11002', nome: 'CA 7.3kW ACE', disponivel: 0, reserva: 0, totvs: 0},
            {produto: 'A0070230E11R11305', nome: 'CA 7.3kW ATOM (Wi-Fi)', disponivel: 9, reserva: 0, totvs: 9},
            {produto: 'A0220400E11R11002', nome: 'CA 22kW ATOM', disponivel: 10, reserva: 0, totvs: 10},
            {produto: 'A0220400E11R11004', nome: 'CA 22kW ATOM', disponivel: 171, reserva: 0, totvs: 171},
            {produto: 'D0300380E1EYW11001', nome: 'CC 30kW WB', disponivel: 0, reserva: 40, totvs: 40},
            {produto: 'M0601000E2EYR11001', nome: 'CC 60kW MF', disponivel: -24, reserva: 25, totvs: 1},
            {produto: 'M1201000E2EYR11001', nome: 'CC 120kW MF', disponivel: 17, reserva: 47, totvs: 64},
            {produto: 'C03010E1EAFDR11003', nome: 'CC 30kW MC', disponivel: -16, reserva: 38, totvs: 22},
            {produto: 'C04010E2EAFER11003', nome: 'CC 40kW MC', disponivel: 0, reserva: 10, totvs: 10},
            {produto: 'C06010E2EAFGR11003', nome: 'CC 60kW MC', disponivel: 1, reserva: 17, totvs: 18},
            {produto: 'M18010E2EYFIR11003', nome: 'CC 180kW MSF', disponivel: 2, reserva: 16, totvs: 18},
            {produto: 'M24010E2EYGIR11003', nome: 'CC 240kW MSF', disponivel: 15, reserva: 1, totvs: 16}
        ];

        // Configuração do Google Sheets
        const SHEET_ID = '10ziICWxJTYYR_dNIvtr5gu1FEO8MT1aZTiLjWcPcZZE';
        const GID = '1899085269';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let charts = {};

        // Mapa de ícones por cliente
        const clientIcons = {
            'GWM': '🚗',
            'RENAULT': '🚙',
            'TC': '🚐'
        };

        // Mapeamento das colunas do Google Sheets
        const COLUNAS = {
            CONTRATO: 65,    // Coluna BN (BN = 1*26 + 13 = 39... recalculando: B=1, N=13, BN em Excel é coluna 66, índice 65)
            CLIENTE: 13,     // Coluna N (14ª coluna, índice 13)
            STATUS: 61,      // Coluna BJ (índice 61)
            PRODUTO: 32,     // Coluna AG (índice 32)
            QUANTIDADE: 35   // Coluna AJ (índice 35)
        };

        // Função para converter letra de coluna Excel para índice (A=0, B=1, ... AA=26, etc.)
        function colToIndex(col) {
            let index = 0;
            for (let i = 0; i < col.length; i++) {
                index = index * 26 + (col.charCodeAt(i) - 'A'.charCodeAt(0) + 1);
            }
            return index - 1;
        }

        // Calcular índices corretos
        const COL_INDICES = {
            CONTRATO: colToIndex('BN'),    // BN
            CLIENTE: colToIndex('N'),       // N
            STATUS: colToIndex('BJ'),       // BJ
            PRODUTO: colToIndex('AG'),      // AG
            QUANTIDADE: colToIndex('AJ')    // AJ
        };

        // Função para processar CSV
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                // Processar CSV considerando valores entre aspas
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                data.push(values);
            }
            
            return data;
        }

        // Carregar dados do Google Sheets
        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                console.log('Total de linhas carregadas:', data.length);
                console.log('Primeiras 3 linhas:', data.slice(0, 3));
                console.log('Índices de colunas:', COL_INDICES);
                
                processData(data);
                
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                useSampleData();
            }
        }

        // Usar dados de exemplo
        function useSampleData() {
            const sampleClients = {
                'GWM': {
                    faturado: 85,
                    entregue: 42,
                    emTransito: 28,
                    pendente: 15,
                    produtoPrincipal: 'CC 60kW MF',
                    produtoCodigo: 'M0601000E2EYR11001',
                    vigencia: '01/01/2026 a 31/12/2026',
                    evolucaoMensal: [
                        {mes: 'Jan', quantidade: 12},
                        {mes: 'Fev', quantidade: 18},
                        {mes: 'Mar', quantidade: 25},
                        {mes: 'Abr', quantidade: 15},
                        {mes: 'Mai', quantidade: 10},
                        {mes: 'Jun', quantidade: 5}
                    ]
                },
                'RENAULT': {
                    faturado: 45,
                    entregue: 30,
                    emTransito: 10,
                    pendente: 5,
                    produtoPrincipal: 'CC 30kW MC',
                    produtoCodigo: 'C03010E1EAFDR11003',
                    vigencia: '15/02/2026 a 15/02/2027',
                    evolucaoMensal: [
                        {mes: 'Fev', quantidade: 8},
                        {mes: 'Mar', quantidade: 15},
                        {mes: 'Abr', quantidade: 12},
                        {mes: 'Mai', quantidade: 7},
                        {mes: 'Jun', quantidade: 3}
                    ]
                },
                'TC': {
                    faturado: 32,
                    entregue: 20,
                    emTransito: 8,
                    pendente: 4,
                    produtoPrincipal: 'CA 22kW ATOM',
                    produtoCodigo: 'A0220400E11R11004',
                    vigencia: '01/03/2026 a 28/02/2027',
                    evolucaoMensal: [
                        {mes: 'Mar', quantidade: 10},
                        {mes: 'Abr', quantidade: 12},
                        {mes: 'Mai', quantidade: 6},
                        {mes: 'Jun', quantidade: 4}
                    ]
                }
            };
            
            renderDashboard(sampleClients);
        }

        // Processar dados do Google Sheets
        function processData(rawData) {
            // Filtrar apenas registros com contrato (coluna BN = "SIM")
            const dadosContrato = rawData.filter(row => {
                const contratoValue = (row[COL_INDICES.CONTRATO] || '').toString().toUpperCase().trim();
                return contratoValue === 'SIM' || contratoValue === 'S';
            });
            
            console.log('Registros com contrato:', dadosContrato.length);
            
            if (dadosContrato.length === 0) {
                console.warn('Nenhum registro com contrato encontrado. Usando dados de exemplo.');
                useSampleData();
                return;
            }
            
            // Agrupar por cliente
            const clientesData = {};
            
            dadosContrato.forEach(row => {
                const cliente = (row[COL_INDICES.CLIENTE] || '').toString().trim();
                const status = (row[COL_INDICES.STATUS] || '').toString().toUpperCase().trim();
                const produto = (row[COL_INDICES.PRODUTO] || '').toString().trim();
                const quantidadeStr = (row[COL_INDICES.QUANTIDADE] || '0').toString().trim();
                const quantidade = parseInt(quantidadeStr.replace(/\D/g, '')) || 1;
                
                // Normalizar nome do cliente
                let clienteNome = cliente.toUpperCase();
                if (clienteNome.includes('GWM') || clienteNome.includes('DIMAS')) {
                    clienteNome = 'GWM';
                } else if (clienteNome.includes('RENAULT')) {
                    clienteNome = 'RENAULT';
                } else if (clienteNome.includes('TC') || clienteNome.includes('TRITEC')) {
                    clienteNome = 'TC';
                } else {
                    console.log('Cliente não reconhecido:', cliente);
                    return; // Ignorar outros clientes
                }
                
                if (!clientesData[clienteNome]) {
                    clientesData[clienteNome] = {
                        registros: [],
                        faturado: 0,
                        entregue: 0,
                        emTransito: 0,
                        pendente: 0,
                        produtos: {},
                        evolucaoMensal: []
                    };
                }
                
                clientesData[clienteNome].registros.push(row);
                
                // Contar produtos
                if (produto) {
                    clientesData[clienteNome].produtos[produto] = 
                        (clientesData[clienteNome].produtos[produto] || 0) + quantidade;
                }
                
                // Classificar por status
                if (status.includes('ENTREGUE') || status.includes('DELIVERED') || status.includes('CONCLUÍDO') || status.includes('CONCLUIDO')) {
                    clientesData[clienteNome].entregue += quantidade;
                    clientesData[clienteNome].faturado += quantidade;
                } else if (status.includes('TRÂNSITO') || status.includes('TRANSITO') || status.includes('TRANSIT')) {
                    clientesData[clienteNome].emTransito += quantidade;
                    clientesData[clienteNome].faturado += quantidade;
                } else if (status.includes('FATURADO') || status.includes('INVOICED') || status.includes('NF')) {
                    clientesData[clienteNome].faturado += quantidade;
                } else if (status.includes('PENDENTE') || status.includes('PENDING')) {
                    clientesData[clienteNome].pendente += quantidade;
                } else {
                    // Se não reconhecer o status, considerar como pendente
                    clientesData[clienteNome].pendente += quantidade;
                }
            });
            
            // Identificar produto principal de cada cliente
            Object.keys(clientesData).forEach(cliente => {
                const produtos = clientesData[cliente].produtos;
                if (Object.keys(produtos).length > 0) {
                    const produtoPrincipal = Object.keys(produtos).reduce((a, b) => 
                        produtos[a] > produtos[b] ? a : b, '');
                    
                    clientesData[cliente].produtoPrincipal = produtoPrincipal;
                    clientesData[cliente].produtoCodigo = produtoPrincipal;
                }
                
                // Dados de vigência (podem ser adicionados depois se tiver no Google Sheets)
                clientesData[cliente].vigencia = '01/01/2026 a 31/12/2026';
            });
            
            console.log('Dados processados por cliente:', clientesData);
            
            if (Object.keys(clientesData).length === 0) {
                console.warn('Nenhum cliente identificado. Usando dados de exemplo.');
                useSampleData();
                return;
            }
            
            renderDashboard(clientesData);
        }

        // Renderizar dashboard
        function renderDashboard(clientesData) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            const container = document.getElementById('clients-container');
            container.innerHTML = '';

            // Ordem de exibição: GWM primeiro, depois outros
            const clientesOrdenados = ['GWM', 'RENAULT', 'TC'].filter(c => clientesData[c]);

            clientesOrdenados.forEach((cliente, index) => {
                const data = clientesData[cliente];
                const clientClass = cliente.toLowerCase();
                const icon = clientIcons[cliente] || '🚗';

                // Seção do cliente
                const section = document.createElement('div');
                section.className = 'client-section';
                section.innerHTML = `
                    <div class="client-card ${clientClass}">
                        <h2>
                            ${icon} Contrato ${cliente}
                            <span class="client-badge">${data.faturado} unidades faturadas</span>
                        </h2>
                        <p id="summary-${cliente}"></p>
                    </div>

                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-label">Total Faturado</div>
                            <div class="kpi-value" id="kpi-faturado-${cliente}">${data.faturado}</div>
                            <div class="kpi-subtitle">unidades</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Total Entregue</div>
                            <div class="kpi-value" id="kpi-entregue-${cliente}">${data.entregue}</div>
                            <div class="kpi-subtitle">unidades</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Em Trânsito</div>
                            <div class="kpi-value" id="kpi-transito-${cliente}">${data.emTransito}</div>
                            <div class="kpi-subtitle">unidades</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">% Entregue</div>
                            <div class="kpi-value" id="kpi-percentual-${cliente}">${data.faturado > 0 ? Math.round((data.entregue / data.faturado) * 100) : 0}%</div>
                            <div class="kpi-subtitle">do total faturado</div>
                        </div>
                    </div>

                    <div class="contract-info">
                        <div class="contract-info-grid">
                            <div class="info-item">
                                <div class="info-label">Vigência</div>
                                <div class="info-value">${data.vigencia || '--/--/---- a --/--/----'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Observação</div>
                                <div class="info-value">Sem volume mínimo obrigatório</div>
                            </div>
                        </div>
                    </div>

                    <div class="charts-section">
                        <div class="chart-card">
                            <h3>Pipeline de Status - ${cliente}</h3>
                            <canvas id="pipeline-${cliente}"></canvas>
                        </div>
                        ${data.evolucaoMensal ? `
                        <div class="chart-card">
                            <h3>Evolução Mensal - ${cliente}</h3>
                            <canvas id="evolution-${cliente}"></canvas>
                        </div>
                        ` : ''}
                    </div>
                `;

                container.appendChild(section);

                // Atualizar resumo narrativo
                const percentualEntregue = data.faturado > 0 ? Math.round((data.entregue / data.faturado) * 100) : 0;
                document.getElementById(`summary-${cliente}`).innerHTML = 
                    `A ${cliente} já faturou <strong>${data.faturado} unidades</strong>, sendo <strong>${data.entregue} entregues</strong> e <strong>${data.emTransito} ainda em trânsito</strong>. O principal volume está concentrado em <strong>${data.produtoPrincipal || 'diversos produtos'}</strong>.`;

                // Renderizar gráficos
                renderPipelineChart(cliente, data);
                if (data.evolucaoMensal) {
                    renderEvolutionChart(cliente, data.evolucaoMensal);
                }
            });

            // Estoque (apenas uma vez, no final)
            const stockSection = document.createElement('div');
            stockSection.innerHTML = `
                <div class="stock-section">
                    <h3>⚠️ Estoque de Produtos Mobility</h3>
                    <div class="stock-grid" id="stock-grid"></div>
                </div>
            `;
            container.appendChild(stockSection);
            renderStock();
        }

        // Gráfico de Pipeline
        function renderPipelineChart(cliente, data) {
            const ctx = document.getElementById(`pipeline-${cliente}`).getContext('2d');
            
            if (charts[`pipeline-${cliente}`]) {
                charts[`pipeline-${cliente}`].destroy();
            }
            
            charts[`pipeline-${cliente}`] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pendente', 'Faturado', 'Em Trânsito', 'Entregue'],
                    datasets: [{
                        label: 'Unidades',
                        data: [data.pendente, data.faturado, data.emTransito, data.entregue],
                        backgroundColor: [
                            'rgba(255, 167, 38, 0.8)',
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(245, 87, 108, 0.8)',
                            'rgba(102, 187, 106, 0.8)'
                        ],
                        borderColor: [
                            'rgba(255, 167, 38, 1)',
                            'rgba(102, 126, 234, 1)',
                            'rgba(245, 87, 108, 1)',
                            'rgba(102, 187, 106, 1)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 10
                            }
                        }
                    }
                }
            });
        }

        // Gráfico de Evolução
        function renderEvolutionChart(cliente, evolucaoData) {
            const ctx = document.getElementById(`evolution-${cliente}`).getContext('2d');
            
            if (charts[`evolution-${cliente}`]) {
                charts[`evolution-${cliente}`].destroy();
            }
            
            charts[`evolution-${cliente}`] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: evolucaoData.map(d => d.mes),
                    datasets: [{
                        label: 'Faturamento (unidades)',
                        data: evolucaoData.map(d => d.quantidade),
                        borderColor: 'rgba(102, 126, 234, 1)',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 5
                            }
                        }
                    }
                }
            });
        }

        // Renderizar estoque
        function renderStock() {
            const container = document.getElementById('stock-grid');
            container.innerHTML = '';

            estoqueData.forEach(item => {
                const div = document.createElement('div');
                
                let stockClass = 'ok';
                if (item.disponivel <= 0) {
                    stockClass = 'low-stock';
                } else if (item.disponivel < 10) {
                    stockClass = 'warning';
                }

                div.className = `stock-item ${stockClass}`;
                div.innerHTML = `
                    <div class="stock-label">${item.nome}</div>
                    <div class="stock-value">${Math.max(0, item.disponivel)}</div>
                    <div class="stock-name">TOTVS: ${item.totvs}${item.reserva > 0 ? ` | Reserva: ${item.reserva}` : ''}</div>
                `;
                container.appendChild(div);
            });
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
