<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Opportunities E-mobility Projects</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#071a2b;color:white;font-family:Arial;padding:20px}
.card{background:#0c2438;padding:15px;margin:10px 0;border-radius:10px}
</style>
</head>

<body>

<h2>Opportunities E-mobility Projects</h2>
<div id="app">Carregando...</div>

<script>

const metas = {
  "Bruno": 50000000,
  "Felipe": 12000000
};

function fmt(v){
  return 'R$ '+Math.round(v/1000).toLocaleString('pt-BR')+'k'
}

function render(data){

let vendedores = {}

data.forEach(o=>{
  const nome = o["VENDEDOR"];
  const valor = Number(o["TOTAL NET (R$)"]||0);

  if(!nome) return;

  if(!vendedores[nome]){
    vendedores[nome]={pipeline:0}
  }

  vendedores[nome].pipeline += valor;
})

let html = ""

Object.keys(metas).forEach(v=>{
  const pipeline = vendedores[v]?.pipeline || 0
  const meta = metas[v]
  const ating = meta ? (pipeline/meta)*100 : 0
  const gap = meta - pipeline

  html += `
  <div class="card">
    <b>${v}</b><br>
    Pipeline: ${fmt(pipeline)}<br>
    Meta: ${fmt(meta)}<br>
    Atingimento: ${ating.toFixed(1)}%<br>
    Gap: ${fmt(gap)}
  </div>
  `
})

document.getElementById("app").innerHTML = html
}

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub?gid=1937499442&single=true&output=csv")
.then(r=>r.text())
.then(text=>{
  const rows = text.split("\n").map(r=>r.split(","))
  const headers = rows[0]

  const data = rows.slice(1).map(r=>{
    let obj={}
    headers.forEach((h,i)=>obj[h.trim()]=r[i])
    return obj
  })

  render(data)
})

</script>

</body>
</html>
