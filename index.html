<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities E-mobility Projects</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background:#071a2b;color:white;font-family:Arial;padding:20px">

<h2>Opportunities E-mobility Projects</h2>
<div id="app">Carregando...</div>

<script>
function fmt(v){return 'R$ '+Math.round(v/1000).toLocaleString('pt-BR')+'k'}

function render(data){
const pipeline = data.reduce((s,o)=>s+(Number(o["TOTAL NET (R$)"]||0)),0)
const ganhos = data.filter(o=>o["STATUS"]==="Ganho").length
const perdidos = data.filter(o=>o["STATUS"]==="Perdido").length

document.getElementById('app').innerHTML = `
Pipeline: ${fmt(pipeline)}<br>
Ganhos: ${ganhos}<br>
Perdidos: ${perdidos}
`
}

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub?gid=1937499442&single=true&output=csv")
.then(res => res.text())
.then(text => {
const rows = text.split("\n").map(r => r.split(","));
const headers = rows[0];
const data = rows.slice(1).map(r => {
let obj = {};
headers.forEach((h,i)=> obj[h.trim()] = r[i]);
return obj;
});
render(data);
});
</script>

</body>
</html>
