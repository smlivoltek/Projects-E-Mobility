<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>E-Mobility CRM Dashboard | Livoltek</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFBFC;--s1:#FFFFFF;--s2:#F8FAFB;
  --brd:#E5E7EB;--brd-light:#F0F1F3;
  --green:#10B981;--green-bg:#ECFDF5;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --text:#1F2937;--muted:#6B7280;--muted2:#9CA3AF;
  --fh:'Plus Jakarta Sans',sans-serif;
  --fb:'Lato',sans-serif;
  --fm:'IBM Plex Mono',monospace;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}

.wrap{position:relative;z-index:1;max-width:1800px;margin:0 auto;padding:24px 32px 48px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--brd);gap:20px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:baseline;gap:12px}
.hdr-t{font-family:var(--fh);font-size:2rem;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.hdr-s{font-size:.75rem;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;
  font-size:.72rem;font-family:var(--fb);font-weight:600;border:1px solid;white-space:nowrap;letter-spacing:.03em;background:#fff}
.p-load{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.p-ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.p-err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.p-date{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse-anim 1.4s ease infinite}
@keyframes pulse-anim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* NAVIGATION */
.nav-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--brd);padding-bottom:0}
.nav-tab{padding:12px 16px;background:transparent;border:none;color:var(--muted2);cursor:pointer;
  font-family:var(--fh);font-weight:600;font-size:.9rem;letter-spacing:.02em;
  border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;position:relative}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* GRID & SPACING */
.g1{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:768px){.g2,.g3,.g4,.g6{grid-template-columns:1fr}}

/* KPI CARD */
.kpi{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:18px;
  position:relative;overflow:hidden;transition:all .2s}
.kpi:hover{border-color:#D1D5DB;background:var(--s2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kpi.t::before{background:var(--blue)}.kpi.g::before{background:var(--green)}
.kpi.a::before{background:var(--amber)}.kpi.r::before{background:var(--red)}
.kpi.b::before{background:var(--blue)}.kpi.p::before{background:var(--blue)}

.kpi-l{font-size:.76rem;color:var(--muted2);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.kpi-v{font-family:var(--fh);font-size:2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;color:var(--text)}
.kpi-v.t{color:var(--blue)}.kpi-v.g{color:var(--green)}.kpi-v.a{color:var(--amber)}.kpi-v.r{color:var(--red)}.kpi-v.b{color:var(--blue)}
.kpi-s{font-size:.7rem;color:var(--muted2);margin-top:8px}

/* TRAFFIC LIGHT */
.semaforo{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.tl{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:20px;text-align:center;
  transition:all .2s;position:relative;overflow:hidden}
.tl:hover{border-color:#D1D5DB}
.tl::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.tl.healthy::before{background:rgba(16,185,129,.04)}.tl.warning::before{background:rgba(245,158,11,.04)}.tl.critical::before{background:rgba(239,68,68,.04)}
.tl:hover::before{opacity:1}
.tl-icon{font-size:3rem;margin-bottom:8px}
.tl-label{font-family:var(--fh);font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:6px}
.tl-desc{font-size:.75rem;color:var(--muted);line-height:1.6}

/* CARD */
.card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:20px;margin-bottom:20px}
.card-t{font-family:var(--fh);font-size:1.05rem;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:8px;margin-bottom:16px;letter-spacing:-.01em}
.card-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}

/* SECTION */
.sec{font-family:var(--fh);font-size:.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text);margin-bottom:14px;margin-top:24px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--brd)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:var(--s2);color:var(--muted);font-weight:600;padding:10px 12px;text-align:left;
  border-bottom:1px solid var(--brd);font-size:.73rem;letter-spacing:.04em;text-transform:uppercase}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--brd-light);color:var(--text)}
.tbl tr:hover{background:var(--s2)}
.tbl .muted{color:var(--muted2);font-size:.78rem}
.tbl .num{font-family:var(--fm);font-weight:600;text-align:right}
.tbl .status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:.7rem;font-weight:600;white-space:nowrap;background:#f3f4f6;color:var(--muted)}
.tbl .status.lead{background:var(--blue-bg);color:var(--blue)}
.tbl .status.proposta{background:var(--amber-bg);color:var(--amber)}
.tbl .status.negociacao{background:var(--blue-bg);color:var(--blue)}
.tbl .status.ganhou{background:var(--green-bg);color:var(--green)}
.tbl .status.perdida{background:var(--red-bg);color:var(--red)}

/* ALERT */
.alert{background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:12px 14px;
  margin-bottom:12px;font-size:.8rem;color:var(--red);display:flex;align-items:flex-start;gap:8px}
.alert-icon{flex-shrink:0;margin-top:1px}

/* LOADING */
.loader{text-align:center;padding:40px 20px;color:var(--muted)}
.spinner{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* HIDDEN */
.hidden{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .wrap{padding:16px 16px 32px}
  .hdr{flex-direction:column;align-items:flex-start}
  .hdr-t{font-size:1.5rem}
  .nav-tabs{flex-wrap:wrap;gap:4px}
  .nav-tab{padding:10px 12px;font-size:.85rem}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <div>
        <div class="hdr-t">E-Mobility CRM</div>
        <div class="hdr-s">Dashboard Executivo</div>
      </div>
    </div>
    <div class="hdr-r">
      <span id="date-pill" class="pill p-date">📅 Loading...</span>
      <span id="status-pill" class="pill p-load"><span class="pulse"></span> Carregando dados...</span>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('diretoria')">📊 Dashboard Diretoria</button>
    <button class="nav-tab" onclick="switchTab('bruno')">👤 Bruno Reis</button>
    <button class="nav-tab" onclick="switchTab('felipe')">👤 Felipe Hanke</button>
    <button class="nav-tab" onclick="switchTab('oportunidades')">📋 Oportunidades</button>
  </div>

  <!-- DIRETORIA -->
  <div id="diretoria" class="tab-content">
    <div id="diretoria-content"></div>
  </div>

  <!-- BRUNO -->
  <div id="bruno" class="tab-content hidden">
    <div id="bruno-content"></div>
  </div>

  <!-- FELIPE -->
  <div id="felipe" class="tab-content hidden">
    <div id="felipe-content"></div>
  </div>

  <!-- OPORTUNIDADES -->
  <div id="oportunidades" class="tab-content hidden">
    <div id="oportunidades-content"></div>
  </div>
</div>

<script>
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub';
const URLS = {
  base: BASE_URL + '?gid=1937499442&single=true&output=csv',
  snapshot: BASE_URL + '?gid=202441246&single=true&output=csv'
};

const METAS = { 'bruno': 50000000, 'felipe': 12000000 };
const REUNIOES = ['2026-06-08', '2026-06-23', '2026-07-08', '2026-07-23', '2026-08-08'];

let DATA = { base: [], snapshot: [] };

// ─── UTILITIES ───
function fK(n){if(!n)return'R$ 0';const v=n/1000000;return v.toFixed(1)+'M'}
function fKs(n){if(!n)return'R$ 0';return'R$ '+n.toLocaleString('pt-BR',{maximumFractionDigits:0})}
function getProxReuniao(){const hoje=new Date();const next=REUNIOES.find(d=>new Date(d)>hoje);return next||REUNIOES[REUNIOES.length-1]}
function get2SemAtas(){const reuniao=getProxReuniao();const d=new Date(reuniao);d.setDate(d.getDate()-14);return d.toISOString().split('T')[0]}
function parseBRL(v){if(!v)return 0;const s=String(v).replace(/R\$\s*/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').trim();const n=parseFloat(s);return isNaN(n)?0:n}
function parseData(d){if(!d)return null;const p=String(d).split(/[-\/]/);if(p[2].length===4)return new Date(p[2],parseInt(p[1])-1,parseInt(p[0]));return new Date(d)}
function diasDesde(d){const t=parseData(d);if(!t)return 999;return Math.floor((new Date()-t)/(1000*60*60*24))}
function diasAte(d){const t=parseData(d);if(!t)return 999;return Math.floor((t-new Date())/(1000*60*60*24))}

// ─── CARREGA DADOS ───
async function loadData(){
  try{
    const [resBase,resSnap]=[await fetch(URLS.base),await fetch(URLS.snapshot)];
    const txtBase=await resBase.text(),txtSnap=await resSnap.text();
    DATA.base=Papa.parse(txtBase,{header:true,skipEmptyLines:true}).data;
    DATA.snapshot=Papa.parse(txtSnap,{header:true,skipEmptyLines:true}).data;
    normalize();
    setPill('ok','✓ Dados carregados');
    renderAll();
  }catch(e){
    setPill('err','✗ Erro ao carregar');
    console.error(e);
  }
}

function normalize(){
  [DATA.base,DATA.snapshot].forEach(rows=>{
    rows.forEach(r=>{
      r._val=parseBRL(r[' TOTAL NET LVK (R$) ']||r.val);
      r._val_ponderado=r._val*(parseFloat(r.PROBABILIDADE||0)/100);
      r._vendor=(r.VENDEDOR||'').toLowerCase();
      r._fechamento=parseData(r['DATA DE FECHAMENTO']||r.data_fechamento);
      r._atualizacao=parseData(r['DATA DA ULTIMA ATUALIZAÇÃO']||r.updated);
      r._dias_sem_atualizar=diasDesde(r._atualizacao);
      r._dias_ate_fechamento=diasAte(r._fechamento);
    });
  });
}

// ─── MÉTRICAS ───
function getMetricas(rows,vendor){
  const filtered=vendor?rows.filter(r=>r._vendor.includes(vendor)):rows;
  const pipeline=filtered.reduce((s,r)=>s+r._val,0);
  const ponderado=filtered.reduce((s,r)=>s+r._val_ponderado,0);
  const ganhos=filtered.filter(r=>r.STATUS==='Ganhou').length;
  const perdidos=filtered.filter(r=>r.STATUS==='Perdida').length;
  const fechados=filtered.filter(r=>r.STATUS==='Ganhou').reduce((s,r)=>s+r._val,0);
  const tempo=[];
  filtered.forEach(r=>{if(r.BID_DATE&&r._fechamento){const ms=r._fechamento-parseData(r.BID_DATE);tempo.push(ms/(1000*60*60*24))}});
  const velocity=tempo.length?tempo.reduce((a,b)=>a+b)/tempo.length:0;
  const winrate=ganhos+perdidos>0?(ganhos/(ganhos+perdidos))*100:0;
  const ticket=filtered.length>0?pipeline/filtered.length:0;
  
  return{pipeline,ponderado,ganhos,perdidos,fechados,velocity,winrate,ticket,count:filtered.length};
}

function getFunil(rows,vendor){
  const filtered=vendor?rows.filter(r=>r._vendor.includes(vendor)):rows;
  const stages={'Lead':0,'Proposta':0,'Negociação':0,'Ganhou':0,'Perdida':0};
  const values={'Lead':0,'Proposta':0,'Negociação':0,'Ganhou':0,'Perdida':0};
  filtered.forEach(r=>{
    const st=r.ESTAGIO||'Lead';
    stages[st]=(stages[st]||0)+1;
    values[st]=(values[st]||0)+r._val;
  });
  return{stages,values};
}

function getAging(rows,vendor){
  const filtered=vendor?rows.filter(r=>r._vendor.includes(vendor)):rows;
  const bins={0:0,30:0,60:0,90:0};
  filtered.forEach(r=>{
    if(!r._atualizacao)return;
    const dias=r._dias_sem_atualizar;
    if(dias<=30)bins[0]+=r._val;
    else if(dias<=60)bins[30]+=r._val;
    else if(dias<=90)bins[60]+=r._val;
    else bins[90]+=r._val;
  });
  return bins;
}

function getDependencia(rows,vendor){
  const filtered=vendor?rows.filter(r=>r._vendor.includes(vendor)):rows;
  const byClient={};
  filtered.forEach(r=>{
    const c=r.CUSTOMER||'Unknown';
    byClient[c]=(byClient[c]||0)+r._val;
  });
  const sorted=Object.entries(byClient).sort((a,b)=>b[1]-a[1]);
  const top5=sorted.slice(0,5).reduce((s,e)=>s+e[1],0);
  const total=filtered.reduce((s,r)=>s+r._val,0);
  return{concentration:(top5/total*100)||0,top5:sorted.slice(0,5)};
}

function getAlertasVendedor(rows,vendor){
  const filtered=rows.filter(r=>r._vendor.includes(vendor));
  const alertas=[];
  filtered.forEach(r=>{
    if(r._dias_sem_atualizar>15)alertas.push({tipo:'sem-atualizacao',dias:r._dias_sem_atualizar,cliente:r.CUSTOMER,valor:r._val});
    if(r._dias_ate_fechamento<90&&r._dias_ate_fechamento>0)alertas.push({tipo:'vencimento',dias:r._dias_ate_fechamento,cliente:r.CUSTOMER});
    if(!r['PROX PASSO']||String(r['PROX PASSO']).trim()==='')alertas.push({tipo:'sem-passo',cliente:r.CUSTOMER});
  });
  return alertas.sort((a,b)=>(a.dias||999)-(b.dias||999)).slice(0,10);
}

// ─── RENDER DIRETORIA ───
function renderDiretoria(){
  const rows=DATA.base;
  const met={bruno:getMetricas(rows,'bruno'),felipe:getMetricas(rows,'felipe'),total:getMetricas(rows)};
  const funil={bruno:getFunil(rows,'bruno'),felipe:getFunil(rows,'felipe')};
  
  const metaBruno=METAS.bruno,metaFelipe=METAS.felipe;
  const coberturaB=met.bruno.pipeline/metaBruno,coberturaF=met.felipe.pipeline/metaFelipe;
  const coverageTotal=met.total.pipeline/(metaBruno+metaFelipe);
  
  const statusB=coberturaB>=4?'healthy':coberturaB>=2?'warning':'critical';
  const statusF=coberturaF>=4?'healthy':coberturaF>=2?'warning':'critical';
  
  let html=`
  <div class="g4">
    <div class="kpi t">
      <div class="kpi-l">Pipeline Total</div>
      <div class="kpi-v t">${fK(met.total.pipeline)}</div>
      <div class="kpi-s">Todos os vendedores</div>
    </div>
    <div class="kpi b">
      <div class="kpi-l">Pipeline Ponderado</div>
      <div class="kpi-v b">${fK(met.total.ponderado)}</div>
      <div class="kpi-s">Prob. média: ${(met.total.ponderado/met.total.pipeline*100||0).toFixed(0)}%</div>
    </div>
    <div class="kpi g">
      <div class="kpi-l">Meta Anual</div>
      <div class="kpi-v g">${fK(metaBruno+metaFelipe)}</div>
      <div class="kpi-s">Jan-Dez 2026</div>
    </div>
    <div class="kpi a">
      <div class="kpi-l">Cobertura da Meta</div>
      <div class="kpi-v a">${(coverageTotal*100).toFixed(0)}%</div>
      <div class="kpi-s">${coverageTotal>=3?'✓ Saudável':'⚠ Verificar'}</div>
    </div>
  </div>

  <div class="sec">Semáforo Comercial</div>
  <div class="semaforo">
    <div class="tl ${statusB}">
      <div class="tl-icon">${statusB==='healthy'?'🟢':statusB==='warning'?'🟡':'🔴'}</div>
      <div class="tl-label">Bruno Reis</div>
      <div class="tl-desc">Cobertura: ${(coberturaB*100).toFixed(0)}%<br>${coberturaB>=4?'Pipeline saudável':coberturaB>=2?'Atenção necessária':'CRÍTICO'}</div>
    </div>
    <div class="tl ${statusF}">
      <div class="tl-icon">${statusF==='healthy'?'🟢':statusF==='warning'?'🟡':'🔴'}</div>
      <div class="tl-label">Felipe Hanke</div>
      <div class="tl-desc">Cobertura: ${(coberturaF*100).toFixed(0)}%<br>${coberturaF>=4?'Pipeline saudável':coberturaF>=2?'Atenção necessária':'CRÍTICO'}</div>
    </div>
    <div class="tl">
      <div class="tl-icon">📊</div>
      <div class="tl-label">Equipe</div>
      <div class="tl-desc">Cobertura total: ${(coverageTotal*100).toFixed(0)}%<br>${coverageTotal>=3?'✓ Acima da meta':coverageTotal>=2?'⚠ Próximo de meta':'✗ Abaixo da meta'}</div>
    </div>
  </div>

  <div class="sec">Meta por Vendedor</div>
  <table class="tbl" style="margin-bottom:20px">
    <tr>
      <th>Vendedor</th>
      <th class="num">Meta</th>
      <th class="num">Pipeline</th>
      <th class="num">Ponderado</th>
      <th class="num">GAP</th>
      <th class="num">Cobertura</th>
    </tr>
    <tr>
      <td><strong>Bruno Reis</strong></td>
      <td class="num">${fK(metaBruno)}</td>
      <td class="num">${fK(met.bruno.pipeline)}</td>
      <td class="num">${fK(met.bruno.ponderado)}</td>
      <td class="num" style="color:${met.bruno.pipeline>=metaBruno?'var(--green)':'var(--red)'}">${fK(met.bruno.pipeline-metaBruno)}</td>
      <td class="num" style="color:${coberturaB>=2?'var(--green)':'var(--amber)'}">${(coberturaB*100).toFixed(0)}%</td>
    </tr>
    <tr>
      <td><strong>Felipe Hanke</strong></td>
      <td class="num">${fK(metaFelipe)}</td>
      <td class="num">${fK(met.felipe.pipeline)}</td>
      <td class="num">${fK(met.felipe.ponderado)}</td>
      <td class="num" style="color:${met.felipe.pipeline>=metaFelipe?'var(--green)':'var(--red)'}">${fK(met.felipe.pipeline-metaFelipe)}</td>
      <td class="num" style="color:${coberturaF>=2?'var(--green)':'var(--amber)'}">${(coberturaF*100).toFixed(0)}%</td>
    </tr>
  </table>

  <div class="g2">
    <div class="card">
      <div class="card-t">🎯 Win Rate</div>
      <table class="tbl" style="font-size:.8rem">
        <tr><td><strong>Bruno</strong></td><td class="num">${met.bruno.winrate.toFixed(0)}%</td></tr>
        <tr><td><strong>Felipe</strong></td><td class="num">${met.felipe.winrate.toFixed(0)}%</td></tr>
      </table>
    </div>
    <div class="card">
      <div class="card-t">⏱️ Velocity (dias médios)</div>
      <table class="tbl" style="font-size:.8rem">
        <tr><td><strong>Bruno</strong></td><td class="num">${met.bruno.velocity.toFixed(0)}</td></tr>

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
}

function setPill(status,text){
  const pill=document.getElementById('status-pill');
  pill.className='pill '+{ok:'p-ok',err:'p-err'}[status];
  pill.innerHTML=(status==='ok'?'✓ ':'✗ ')+text;
}

function updateDate(){
  const d=new Date();
  const next=getProxReuniao();
  document.getElementById('date-pill').textContent='📅 '+d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})+' | Próx reunião: '+new Date(next).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
