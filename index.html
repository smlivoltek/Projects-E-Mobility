<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>E-Mobility CRM | Executivo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFBFC;--s1:#FFFFFF;--s2:#F8FAFB;--s3:#F3F4F6;
  --brd:#E5E7EB;--brd-light:#F0F1F3;
  --green:#10B981;--green-bg:#ECFDF5;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --text:#1F2937;--muted:#6B7280;--muted2:#9CA3AF;
  --fh:'Plus Jakarta Sans',sans-serif;--fb:'Lato',sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.6}
.wrap{max-width:1600px;margin:0 auto;padding:24px 32px}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:16px}
.hdr-t{font-family:var(--fh);font-size:2rem;font-weight:900;color:var(--text)}
.hdr-s{font-size:.75rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:.72rem;font-weight:600;border:1px solid;background:#fff}
.p-ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.p-err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.p-warn{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}

/* TABS */
.nav-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--brd)}
.nav-tab{padding:12px 16px;background:none;border:none;color:var(--muted2);cursor:pointer;font-family:var(--fh);font-weight:600;font-size:.9rem;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* GRID */
.g1{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:20px;margin-bottom:20px}
.card-t{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* KPI CARD */
.kpi{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:18px;position:relative;overflow:hidden;transition:all .2s}
.kpi:hover{border-color:#D1D5DB;background:var(--s2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kpi.green::before{background:var(--green)}.kpi.red::before{background:var(--red)}.kpi.amber::before{background:var(--amber)}.kpi.blue::before{background:var(--blue)}
.kpi-l{font-size:.76rem;color:var(--muted2);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.kpi-v{font-family:var(--fh);font-size:2rem;font-weight:800;color:var(--text);margin-bottom:4px}
.kpi-s{font-size:.7rem;color:var(--muted2);margin-top:8px}

/* SECTION */
.sec{font-family:var(--fh);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:14px;margin-top:24px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ALERT BOX */
.alert{background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:.8rem;color:var(--red);display:flex;align-items:flex-start;gap:8px}
.alert.warn{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.alert.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:var(--s3);color:var(--muted);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--brd);font-size:.73rem;text-transform:uppercase}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--brd-light);color:var(--text)}
.tbl tr:hover{background:var(--s2)}
.tbl .num{text-align:right;font-family:monospace;font-weight:600}
.tbl .status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:.7rem;font-weight:600;white-space:nowrap}
.tbl .status.ok{background:var(--green-bg);color:var(--green)}
.tbl .status.warn{background:var(--amber-bg);color:var(--amber)}
.tbl .status.critical{background:var(--red-bg);color:var(--red)}

/* HIDDEN */
.hidden{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .wrap{padding:16px}
  .hdr{flex-direction:column;align-items:flex-start}
  .nav-tabs{flex-wrap:wrap}
  .kpi-v{font-size:1.5rem}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div>
      <div class="hdr-t">E-Mobility CRM</div>
      <div class="hdr-s">Executivo • Decisão Estratégica</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span id="update-pill" class="pill p-ok">📅 Atualizado: --</span>
      <span class="pill p-warn">📅 Próx. reunião: 08/06</span>
      <span id="status-pill" class="pill p-ok">✓ Pronto</span>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('diretoria')">📊 Diretoria</button>
    <button class="nav-tab" onclick="switchTab('bruno')">👤 Bruno Reis</button>
    <button class="nav-tab" onclick="switchTab('felipe')">👤 Felipe Hanke</button>
    <button class="nav-tab" onclick="switchTab('oportunidades')">📋 Oportunidades</button>
  </div>

  <!-- DIRETORIA -->
  <div id="diretoria" class="tab-content">
    <div id="diretoria-content"></div>
  </div>

  <!-- BRUNO -->
  <div id="bruno" class="tab-content hidden">
    <div id="bruno-content"></div>
  </div>

  <!-- FELIPE -->
  <div id="felipe" class="tab-content hidden">
    <div id="felipe-content"></div>
  </div>

  <!-- OPORTUNIDADES -->
  <div id="oportunidades" class="tab-content hidden">
    <div id="oportunidades-content"></div>
  </div>
</div>

<script>
const METAS = {bruno: 50000000, felipe: 12000000};
const URLS = {
  brunoBid: './Opp Bruno - BASE.csv',
  felipeBid: './Opp Felipe - BASE.csv',
  snapshot: './Opp Projects E-mobility - SNAPSHOTS.csv'
};

let DATA = {base: [], snapshot: [], snapshotByOpportunity: {}};

// UTILIDADES
function fK(n){if(!n)return'R$ 0,00';return formatarValor(n)}

// 🔧 Função formatter global - mostra valor real em reais
const formatarValor = (value) => {
  if(value <= 0) return '';
  return 'R$ ' + value.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
};
function fKs(n){if(!n)return'R$ 0';return'R$ '+n.toLocaleString('pt-BR',{maximumFractionDigits:0})}
function parseBRL(v){if(!v)return 0;const s=String(v).replace(/R\$\s*/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').trim();const n=parseFloat(s);return isNaN(n)?0:n}
function parseData(d){if(!d||d==='')return null;try{const s=String(d).trim().replace(/\/0206/g,'/2026');if(!s||s.length<6)return null;const p=s.split(/[-\/]/);if(p.length<3)return null;let ano,mes,dia;if(p[0].length===4){ano=parseInt(p[0]);mes=parseInt(p[1]);dia=parseInt(p[2])}else{dia=parseInt(p[0]);mes=parseInt(p[1]);ano=parseInt(p[2])}if(ano<1900||ano>2100||mes<1||mes>12||dia<1||dia>31)return null;const d=new Date(ano,mes-1,dia);return d.getFullYear()===ano?d:null}catch(e){return null}}
function diasDesde(d){if(!d)return 999;try{const t=(d instanceof Date)?d:parseData(d);if(!t)return 999;return Math.max(0,Math.floor((new Date()-t)/(1000*60*60*24))))}catch(e){return 999}}
function diasAte(d){if(!d)return 999;try{const t=(d instanceof Date)?d:parseData(d);if(!t)return 999;return Math.max(0,Math.floor((t-new Date())/(1000*60*60*24))))}catch(e){return 999}}

// LOAD DATA
async function loadData(){
  try{
    console.log('🔄 Carregando dados do repositório local...');
    
    // Carregar Opp Bruno
    console.log('📋 Carregando Opp Bruno - BASE.csv...');
    const resBruno = await fetch(URLS.brunoBid, {method:'GET'});
    if(!resBruno.ok) throw new Error(`Opp Bruno não encontrado`);
    const txtBruno = await resBruno.text();
    if(!txtBruno || txtBruno.length<100) throw new Error('Opp Bruno vazio');
    const baseBruno = Papa.parse(txtBruno, {header:true, skipEmptyLines:true}).data.filter(r=>r.CUSTOMER);
    console.log('✅ Opp Bruno carregado:', baseBruno.length, 'registros');
    
    // Carregar Opp Felipe
    console.log('📋 Carregando Opp Felipe - BASE.csv...');
    const resFelix = await fetch(URLS.felipeBid, {method:'GET'});
    if(!resFelix.ok) throw new Error(`Opp Felipe não encontrado`);
    const txtFelix = await resFelix.text();
    if(!txtFelix || txtFelix.length<100) throw new Error('Opp Felipe vazio');
    const baseFelix = Papa.parse(txtFelix, {header:true, skipEmptyLines:true}).data.filter(r=>r.CUSTOMER);
    console.log('✅ Opp Felipe carregado:', baseFelix.length, 'registros');
    
    // Mesclar os dois
    DATA.base = [...baseBruno, ...baseFelix];
    console.log('📊 Base consolidada:', DATA.base.length, 'registros totais');
    
    // Carregar SNAPSHOT
    console.log('📋 Carregando Opp Projects E-mobility - SNAPSHOTS.csv...');
    const resSnapshot = await fetch(URLS.snapshot, {method:'GET'});
    if(!resSnapshot.ok) {
      console.warn('⚠️ Snapshot não encontrado');
      DATA.snapshot = [];
    } else {
      const txtSnapshot = await resSnapshot.text();
      if(txtSnapshot && txtSnapshot.length > 100) {
        DATA.snapshot = Papa.parse(txtSnapshot, {header:true, skipEmptyLines:true}).data.filter(r=>r.CUSTOMER);
        console.log('✅ Snapshot carregado:', DATA.snapshot.length, 'registros');
      } else {
        DATA.snapshot = [];
      }
    }
    
    normalize();
    renderAll();
    updateStatus('✓ '+DATA.base.length+' oportunidades carregadas',true);
  }catch(e){
    console.error('❌ Erro ao carregar:', e.message);
    updateStatus('❌ Erro: '+e.message, false);
    setTimeout() => {
      alert(`ERRO:\n${e.message}\n\nSOLUÇÃO:\n1. Verifique os nomes dos CSVs no GitHub\n2. Hard Refresh: Ctrl+F5`);
    }, 1000);
  }
}

function updateStatus(msg,ok){
  const pill=document.getElementById('status-pill');
  pill.textContent=msg;
  pill.className='pill '+(ok?'p-ok':'p-err');
}

function showPasteModal(){
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:#fff;border-radius:12px;padding:32px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <h2 style="margin-bottom:20px;color:#ef4444;font-family:var(--fh);font-size:1.5rem">⚠️ Carregar Dados Manualmente</h2>
    
    <p style="color:#666;margin-bottom:20px;line-height:1.8;font-size:1rem">
      <strong>Google Sheets está bloqueando o acesso automático.</strong><br>
      Siga os passos abaixo para carregar os dados:
    </p>
    
    <div style="background:#f0f9ff;border-left:4px solid #3b82f6;padding:16px;margin-bottom:20px;border-radius:6px">
      <div style="font-weight:600;color:#1f2937;margin-bottom:12px">📋 Passo a Passo:</div>
      <ol style="margin:0;padding-left:20px;color:#666;line-height:2">
        <li><strong>Abra a planilha:</strong> <a href="https://docs.google.com/spreadsheets/d/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/edit" target="_blank" style="color:#3b82f6;text-decoration:underline">Base-Geral</a></li>
        <li><strong>Selecione todos:</strong> Clique na célula vazia superior esquerdo (entre A e 1)</li>
        <li><strong>Copie:</strong> <kbd style="background:#e5e7eb;padding:4px 8px;border-radius:4px">Ctrl+C</kbd></li>
        <li><strong>Cole aqui:</strong> Clique no campo abaixo e cole (<kbd style="background:#e5e7eb;padding:4px 8px;border-radius:4px">Ctrl+V</kbd>)</li>
        <li><strong>Clique em "Carregar"</strong></li>
      </ol>
    </div>
    
    <div style="background:#fff5f5;border:1px solid #fca5a5;padding:12px;border-radius:6px;margin-bottom:20px;font-size:.9rem;color:#991b1b">
      💡 <strong>Dica:</strong> Se a planilha tiver muitos dados, selecione apenas as colunas com dados (A até última coluna com informação)
    </div>
    
    <textarea id="csv-input" style="width:100%;height:280px;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-family:monospace;font-size:.85rem;resize:vertical" placeholder="Cole os dados aqui..."></textarea>
    
    <div style="margin-top:20px;display:flex;gap:8px">
      <button onclick="processCSV()" style="background:#3b82f6;color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;font-weight:600;font-size:1rem;flex:1">✓ Carregar Dados</button>
      <button onclick="document.querySelector('[style*=position:fixed]').remove()" style="background:#e5e7eb;color:#1f2937;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;font-weight:600">Fechar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function processCSV(){
  const csv=document.getElementById('csv-input').value;
  if(!csv.trim())return;
  try{
    const parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    DATA.base=parsed.data.filter(r=>r.CUSTOMER);
    if(!DATA.base.length)throw new Error('Sem dados');
    normalize();
    document.querySelector('[style*="position:fixed"]').remove();
    renderAll();
  }catch(e){
    alert('Erro: '+e.message);
  }
}

function d){
  const s=String(d).trim();
  // Corrigir datas com ano 0206 para 2026
  if(s.includes('/0206')||s.includes('-0206')){
    return s.replace(/\/0206/g,'/2026').replace(/-0206/g,'-2026');
  }
  return d;
}
function d){const s=String(d).trim();if(s.includes('/0206')||s.includes('-0206')){return s.replace(/\/0206/g,'/2026').replace(/-0206/g,'-2026')}return d}
function normalize(){
  DATA.base.forEach(r=>{
    r._val=parseBRL(
      r[' TOTAL NET LVK (R$) '] ||    // Com espaços (original)
      r['TOTAL NET LVK (R$)'] ||      // Sem espaços (coluna S)
      r[' TOTAL NET (R$) '] ||        // Com espaços (original)
      r['TOTAL NET (R$)'] ||          // Sem espaços (coluna R)
      '0'
    );
    
    // 🔧 Inicializar _vendor
    r._vendor = (r['VENDEDOR'] || '').toLowerCase().trim();
    
    // 🔧 Procurar DATA DA ULTIMA ATUALIZAÇÃO com diferentes variações
    let dataAtua = r['DATA DA ULTIMA ATUALIZAÇÃO'] || 
                   r[' DATA DA ULTIMA ATUALIZAÇÃO '] ||
                   r['Data da Última Atualização'] ||
                   r['DATA_DA_ULTIMA_ATUALIZACAO'] ||
                   r['data da ultima atualização'] ||
                   '';
    
    // 🔍 DEBUG: Mostrar o valor RAW da data para clientes específicos
    if(r.CUSTOMER && (r.CUSTOMER.includes('TRANS') || r.CUSTOMER.includes('SAMBAIBA'))) {
      console.log(`🔍 ${r.CUSTOMER}: RAW dataAtua="${dataAtua}"`);
    }
    
    r._atualizacao=parseData(dataAtua);
    
    // 🔍 DEBUG: Mostrar se o parse funcionou
    if(r.CUSTOMER && (r.CUSTOMER.includes('TRANS') || r.CUSTOMER.includes('SAMBAIBA'))) {
      console.log(`   → parseData resultado: ${r._atualizacao}`);
    }
    
    // 🔧 Procurar DATA DE GANHO com diferentes variações de nome
    let dataGanho = r['DATA DE GANHO'] || 
                    r['Data de Ganho'] || 
                    r['DATA_DE_GANHO'] ||
                    r['Data_de_Ganho'] ||
                    r['data de ganho'] ||
                    '';
    r._dataGanho=parseData(dataGanho);
    
    // 🔧 Procurar DATA DE FECHAMENTO com diferentes variações
    let dataFechamento = r['DATA DE FECHAMENTO'] ||
                        r['Data de Fechamento'] ||
                        r['DATA_DE_FECHAMENTO'] ||
                        r['Data_de_Fechamento'] ||
                        r['data de fechamento'] ||
                        '';
    r._fechamento=parseData(dataFechamento);
    
    r._dias_sem_atualizar=diasDesde(r._atualizacao);
    r._dias_ate_fechamento=diasAte(r._fechamento);
    
    // 🔧 Inicializar probabilidade
    r._prob = parseFloat(
      r['PROBABILIDADE'] ||
      r['Probabilidade'] ||
      r['PROBABILITY'] ||
      '0'
    ) || 0;
    
    // 🔧 Calcular valor ponderado (valor * probabilidade / 100)
    r._ponderado = (r._val * r._prob) / 100;
    
    // 🔍 DEBUG: Se dias = 999, mostrar para investigar
    if(r.CUSTOMER && (r.CUSTOMER.includes('TRANS') || r.CUSTOMER.includes('SAMBAIBA'))) {
      console.log(`🔍 ${r.CUSTOMER}: _atualizacao=${r._atualizacao}, _dias_sem_atualizar=${r._dias_sem_atualizar}`);
    }
  });
  
  // 🔄 Processar SNAPSHOT para extrair última/penúltima atualização por oportunidade
  processSnapshotData();
}

// 🔄 Processar SNAPSHOT
function processSnapshotData(){
  if(!DATA.snapshot || DATA.snapshot.length === 0) {
    console.log('⚠️ Snapshot vazio ou não carregado');
    return;
  }
  
  console.log('📊 Processando snapshot com', DATA.snapshot.length, 'registros');
  
  // Agrupar por ID_OPORTUNIDADE
  const byOpportunity = {};
  
  DATA.snapshot.forEach(r => {
    const oppId = r['ID_OPORTUNIDADE'] || r['ID da oportunidade'] || '';
    if(!oppId) return;
    
    // Processar valores
    r._val = parseBRL(
      r[' TOTAL NET LVK (R$) '] ||
      r['TOTAL NET LVK (R$)'] ||
      r[' TOTAL NET (R$) '] ||
      r['TOTAL NET (R$)'] ||
      '0'
    );
    
    r._vendor = (r['VENDEDOR'] || '').toLowerCase();
    r._atualizacao = parseData(r['DATA DA ULTIMA ATUALIZAÇÃO'] || '');    r._status = (r['STATUS'] || '').trim();
    
    // Agrupar
    if(!byOpportunity[oppId]) {
      byOpportunity[oppId] = [];
    }
    byOpportunity[oppId].push(r);
  });
  
  console.log('✅ Agrupadas', Object.keys(byOpportunity).length, 'oportunidades únicas');
  
  // Para cada oportunidade, ordenar por data e pegar última + penúltima
  DATA.snapshotByOpportunity = {};
  
  Object.keys(byOpportunity).forEach(oppId => {
    const records = byOpportunity[oppId];
    
    // Ordenar por data descrescente
    records.sort(a, b) => {
      const dateA = a._atualizacao || new Date(0);
      const dateB = b._atualizacao || new Date(0);
      return dateB - dateA;
    });
    
    DATA.snapshotByOpportunity[oppId] = {
      latest: records[0],
      previous: records[1] || null
    };
  });
  
  console.log('✅ Snapshot processado:', Object.keys(DATA.snapshotByOpportunity).length, 'oportunidades com histórico');
  console.log('📋 Amostra:', Object.entries(DATA.snapshotByOpportunity).slice(0, 2));
}

// MÉTRICAS
function getMetricas(rows,vendor){
  const filtered=vendor?rows.filter(r=>(r._vendor||'').includes(vendor)):rows;
  const pipeline=filtered.reduce(s,r)=>s+r._val,0);
  const ponderado=filtered.reduce(s,r)=>s+r._ponderado,0);
  const ganhos=filtered.filter(r=>r.STATUS==='Ganhou').length;
  const perdidos=filtered.filter(r=>r.STATUS==='Perdida').length;
  const fechados=filtered.filter(r=>r.STATUS==='Ganhou').reduce(s,r)=>s+r._val,0);
  return{pipeline,ponderado,ganhos,perdidos,fechados,count:filtered.length};
}

function getConcentracao(rows,vendor){
  const filtered=vendor?rows.filter(r=>(r._vendor||'').includes(vendor)):rows;
  const byClient={};
  filtered.forEach(r=>{const c=r.CUSTOMER||'Unknown';byClient[c]=(byClient[c]||0)+r._val});
  const sorted=Object.entries(byClient).sort(a,b)=>b[1]-a[1]);
  const top5=sorted.slice(0,5).reduce(s,e)=>s+e[1],0);
  const total=filtered.reduce(s,r)=>s+r._val,0);
  return{pct:(top5/total*100)||0,top5:sorted.slice(0,5)};
}

function getAging(rows,vendor){
  const filtered=vendor?rows.filter(r=>(r._vendor||'').includes(vendor)):rows;
  return{
    '0-30':filtered.filter(r=>r._dias_sem_atualizar<=30).reduce(s,r)=>s+r._val,0),
    '31-60':filtered.filter(r=>r._dias_sem_atualizar>30&&r._dias_sem_atualizar<=60).reduce(s,r)=>s+r._val,0),
    '61-90':filtered.filter(r=>r._dias_sem_atualizar>60&&r._dias_sem_atualizar<=90).reduce(s,r)=>s+r._val,0),
    '90+':filtered.filter(r=>r._dias_sem_atualizar>90).reduce(s,r)=>s+r._val,0)
  };
}

function getOppsCriticas(rows){
  return rows.filter(r=>r._val>0).sort(a,b)=>b._val-a._val).slice(0,5);
}

// 🔄 CALCULAR COMPARATIVO COM SNAPSHOT (ÚLTIMA VS PENÚLTIMA ATUALIZAÇÃO)
function getComparativoSnapshot(vendor){
  const oppsByVendor = Object.values(DATA.snapshotByOpportunity || {});
  
  // Filtrar por vendedor
  const filtered = vendor ? 
    oppsByVendor.filter(opp => {
      const latestVendor = (opp.latest?.VENDEDOR || '').toLowerCase().trim();
      return latestVendor.includes(vendor.toLowerCase());
    }) : 
    oppsByVendor;
  
  console.log(`🔄 getComparativoSnapshot(${vendor}): ${filtered.length} oportunidades`);
  
  const agora = { pipeline: 0, ganhos: 0, perdidos: 0, clientes_novos: 0, ganhos_list: [], perdidos_list: [], clientes_novos_list: [] };
  const anterior = { pipeline: 0, ganhos: 0, perdidos: 0 };
  
  filtered.forEach(opp, idx) => {
    const latest = opp.latest;
    const previous = opp.previous;
    
    if(!latest) return;
    
    const customer = latest.CUSTOMER || latest['CUSTOMER'] || 'Unknown';
    
    // Pegar valor da última atualização - TENTA VÁRIOS NOMES DE COLUNA
    let valorRaw = latest[' TOTAL NET LVK (R$) '] || 
                   latest['TOTAL NET LVK (R$)'] ||
                   latest[' TOTAL NET (R$) '] ||
                   latest['TOTAL NET (R$)'] ||
                   '0';
    
    const valorLatest = parseBRL(valorRaw);
    
    const statusLatest = (latest.STATUS || '').toLowerCase().trim();
    
    // DEBUG dos primeiros 5 registros
    if(idx < 5) {
      console.log(`   [${idx+1}] ${customer}: previous=${previous?'SIM':'NÃO'} | RAW="${valorRaw}" → PARSED=${valorLatest} R$ | STATUS="${statusLatest}"`);
    }
    
    // ✅ AGORA (Latest)
    if(statusLatest.includes('ganh')) {
      agora.ganhos += 1;
      agora.ganhos_list.push(customer);
    } else if(statusLatest.includes('perd')) {
      agora.perdidos += 1;
      agora.perdidos_list.push(customer);
    } else {
      // Pipeline = tudo que NÃO é ganho ou perdido
      agora.pipeline += valorLatest;
    }
    
    // Cliente novo?
    if(!previous) {
      agora.clientes_novos += 1;
      agora.clientes_novos_list.push(customer);
    }
    
    // 📊 ANTERIOR (Previous)
    if(previous) {
      const valorPrevious = parseBRL(
        previous[' TOTAL NET LVK (R$) '] ||
        previous['TOTAL NET LVK (R$)'] ||
        '0'
      );
      
      const statusPrevious = (previous.STATUS || '').toLowerCase().trim();
      
      if(statusPrevious.includes('ganh')) {
        anterior.ganhos += 1;
      } else if(statusPrevious.includes('perd')) {
        anterior.perdidos += 1;
      } else {
        anterior.pipeline += valorPrevious;
      }
      
      if(idx < 3) {
        console.log(`  📌 ${customer}: ANTERIOR=${fK(valorPrevious)} → AGORA=${fK(valorLatest)}`);
      }
    }
  });
  
  console.log('═'.repeat(60));
  console.log(`📊 RESULTADO FINAL para "${vendor}":`);
  console.log(`   AGORA - Pipeline: ${fK(agora.pipeline)} | Ganhos: ${agora.ganhos} | Perdidos: ${agora.perdidos} | NOVOS: ${agora.clientes_novos}`);
  console.log(`   ANTERIOR - Pipeline: ${fK(anterior.pipeline)} | Ganhos: ${anterior.ganhos} | Perdidos: ${anterior.perdidos}`);
  console.log(`   DELTA - Pipeline: ${fK(agora.pipeline - anterior.pipeline)} | Ganhos: ${agora.ganhos - anterior.ganhos} | Perdidos: ${agora.perdidos - anterior.perdidos}`);
  
  // DEBUG: mostrar todos os clientes novos
  if(agora.clientes_novos_list.length > 0) {
    console.log(`\n📌 CLIENTES NOVOS (${agora.clientes_novos_list.length}):`);
    agora.clientes_novos_list.forEach(c, i) => {
      console.log(`   ${i+1}. ${c}`);
    });
  }
  
  console.log('═'.repeat(60));
  
  return {
    agora,
    anterior,
    deltas: {
      pipeline: agora.pipeline - anterior.pipeline,
      ganhos: agora.ganhos - anterior.ganhos,
      perdidos: agora.perdidos - anterior.perdidos
    }
  };
}

      <select id="filter-prob-bruno" style="padding:8px;border:1px solid var(--brd);border-radius:6px;font-size:.85rem">

        <option value="75">Acima 75%</option>
        <option value="50">Acima 50%</option>
        <option value="0">Todas</option>
      </select>

        <th class="num">Prob %</th>
        <th>Estágio</th>
      </tr>
  `;
  rows.sort(a,b)=>b._prob-a._prob).forEach(r=>{

  document.getElementById('bruno-content').innerHTML=html;

  document.getElementById('filter-prob-bruno').addEventListener('change',()=>filterClientesBruno());

function filterClientesBruno(){
  const cliente=document.getElementById('filter-cliente-bruno').value.toLowerCase();
  const prob=parseInt(document.getElementById('filter-prob-bruno').value)||0;
  document.querySelectorAll('.cliente-row-bruno').forEach(row=>{
    const matchCliente=!cliente||row.dataset.cliente.includes(cliente);
    const matchProb=!prob||parseInt(row.dataset.prob)>=prob;
    row.style.display=matchCliente&&matchProb?'':'none';
  });
}

// RENDER FELIPE
function renderFelipe(){
  const rows=DATA.base.filter(r=>(r._vendor||'').includes('felipe'));

  const oppsParadas=rows.filter(r=>r._dias_sem_atualizar>25);
  const oppsTop=rows.filter(r=>(r['TOP 10']||'').toLowerCase()==='sim').sort(a,b)=>b._val-a._val);
  const metFelipe_conc=getConcentracao(rows);
  
  // 🔄 Calcular comparativo usando snapshot

  let html=`

  ${cobertura<1.5?`<div class="alert"><strong>🔴 CRÍTICO: Abaixo da meta</strong><br>Pipeline: ${fK(met.pipeline)} vs Meta: ${fK(metaAnual)}<br>Ação: Suporte diretoria + novos leads HOJE</div>`:''}

  if(oppsVencendo.length>0){
    html+=`<div class="alert ok"><strong>✓ Próximos de fechar:</strong>`;
    oppsVencendo.slice(0,3).forEach(r=>{
      html+=`<br>• ${r.CUSTOMER} em ${r._dias_ate_fechamento}d`;
    });
    html+=`</div>`;
  }
  
  html+=`</div>

  <!-- COMPARATIVO: AGORA VS 2 SEMANAS ATRÁS -->
  <div class="sec">📊 Comparativo: Agora vs 2 Semanas Atrás</div>
  <div class="g2">
    <div class="card">
      <table class="tbl">
        <tr><th>Métrica</th><th class="num">Anterior</th><th class="num">Agora</th><th class="num">Δ</th></tr>
        <tr>
          <td><strong>Pipeline</strong></td>
          <td class="num">${fK(comp.anterior.pipeline)}</td>
          <td class="num">${fK(comp.agora.pipeline)}</td>
          <td class="num" style="color:${comp.deltas.pipeline>=0?'var(--green)':'var(--red)'}">${comp.deltas.pipeline>=0?'+':''}${fK(comp.deltas.pipeline)}</td>
        </tr>
        <tr>
          <td><strong>Deals Fechados</strong></td>
          <td class="num">${comp.anterior.ganhos}</td>
          <td class="num">${comp.agora.ganhos}</td>

        </tr>

          <td><strong>Deals Perdidos</strong></td>
          <td class="num">${comp.anterior.perdidos}</td>

        </tr>

    </div>
    <div class="card">
      <table class="tbl">
        <tr><th>Métrica</th><th class="num">Valor</th><th>Status</th></tr>
        <tr>
          <td><strong>Novos Clientes</strong></td>
          <td class="num">${comp.agora.clientes_novos}</td>
          <td><span class="status ok">Novos 2w</span></td>
        </tr>
        ${comp.agora.clientes_novos_list.length > 0 ? `<tr style="background:#f9fafb"><td colspan="3" style="font-size:0.85rem;color:#666;padding:8px">📌 ${comp.agora.clientes_novos_list.join(", ")}</td></tr>` : ""}
        <tr>
          <td><strong>Cobertura Meta</strong></td>
          <td class="num">${(cobertura*100).toFixed(0)}%</td>
          <td><span class="status ${cobertura>=1?'ok':'critical'}">${cobertura>=1?'OK':'CRÍTICO'}</span></td>

        <tr>
          <td><strong>Opps Paradas</strong></td>
          <td class="num">${oppsParadas.length}</td>
          <td><span class="status warn">Atenção</span></td>
        <tr>
          <td><strong>Concentração Top 5</strong></td>
          <td class="num">${(metFelipe_conc.pct).toFixed(0)}%</td>
          <td><span class="status ${metFelipe_conc.pct>60?"critical":metFelipe_conc.pct>40?"warn":"ok"}">${metFelipe_conc.pct>60?"🔴 RISCO":metFelipe_conc.pct>40?"🟡 MÉDIO":"🟢 OK"}</span></td>
        </tr>
        </tr>
      </table>
    </div>
  </div>

  <!-- TOP 10 DEALS -->
  <div class="sec">🎯 Top 10 Deals (Seu Foco)</div>
  <div class="card">
    <table class="tbl">
      <tr>
        <th>Cliente</th>
        <th class="num">Valor</th>
        <th class="num">Prob</th>
        <th>Vencimento</th>
        <th>Status</th>
      </tr>

  oppsTop.slice(0,10).forEach(r=>{
    const dataF=r._fechamento?r._fechamento.toLocaleDateString('pt-BR'):'-';

    const st=dias>30?'critical':dias>20?'warn':'ok';
    html+=`<tr>
      <td><strong>${r.CUSTOMER}</strong></td>
      <td class="num">${fK(r._val)}</td>
      <td class="num">${r._prob}%</td>
      <td>${dataF}</td>
      <td><span class="status ${st}">${st==='critical'?'🔴 Parado':st==='warn'?'🟡 Atenção':'✓ OK'}</span></td>
    </tr>`;
  });
  html+=`</table></div>

  <!-- TODOS OS CLIENTES (FILTRO) -->
  <div class="sec">📋 Todos os Clientes (Filtrados por Probabilidade)</div>
  <div class="card">
    <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">

        <option value="90">Acima 90%</option>
        <option value="75">Acima 75%</option>
        <option value="50">Acima 50%</option>
        <option value="0">Todas</option>

    </div>
    <table class="tbl" id="cliente-table-felipe">

        <th>Cliente</th>
        <th class="num">Valor</th>
        <th class="num">Prob %</th>
        <th>Estágio</th>
      </tr>
  `;
  rows.sort(a,b)=>b._prob-a._prob).forEach(r=>{
    html+=`<tr class="cliente-row-felipe" data-cliente="${r.CUSTOMER.toLowerCase()}" data-prob="${r._prob||0}">
      <td><strong>${r.CUSTOMER}</strong></td>
      <td class="num">${fK(r._val)}</td>
      <td class="num" style="color:${r._prob>=75?'var(--green)':r._prob>=50?'var(--amber)':'var(--red)'}">${r._prob||0}%</td>
      <td>${r.ESTAGIO||'Lead'}</td>
    </tr>`;
  });
  html+=`</table></div>`;

  document.getElementById('felipe-content').innerHTML=html;
  document.getElementById('filter-cliente-felipe').addEventListener('keyup',()=>filterClientesFelipe());
  document.getElementById('filter-prob-felipe').addEventListener('change',()=>filterClientesFelipe());

function renderOportunidades(){

  let html=`
  <div class="card">
    <div class="card-t">📋 Todas as Oportunidades (Ativas)</div>
    <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">

      <select id="filter-vendedor" style="padding:8px;border:1px solid var(--brd);border-radius:6px;font-size:.85rem">
        <option value="">Todos vendedores</option>
        <option value="bruno">Bruno</option>

      <td><strong>${r.CUSTOMER}</strong></td>

  document.getElementById('oportunidades-content').innerHTML=html;

function filterOpps(){
  const cliente=document.getElementById('filter-cliente').value.toLowerCase();
  const vendedor=document.getElementById('filter-vendedor').value.toLowerCase();
  document.querySelectorAll('.opp-row').forEach(row=>{
    const matchCliente=!cliente||row.dataset.cliente.includes(cliente);
    const matchVendedor=!vendedor||row.dataset.vendedor.includes(vendedor);
    row.style.display=matchCliente&&matchVendedor?'':'none';
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
}
