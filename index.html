<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Opportunities E-mobility Projects</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{background:#071a2b;color:white;font-family:Arial;padding:20px}
h2{margin-bottom:5px}
.kpi{display:inline-block;background:#0c2438;padding:15px;margin:10px;border-radius:10px;width:180px}
.card{background:#0c2438;padding:15px;margin:10px;border-radius:10px;display:inline-block;width:260px}
.green{color:#00ff9c}
.yellow{color:#ffd166}
.red{color:#ff4d4d}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #1e3a52;font-size:12px}
th{color:#8aa0b6;text-align:left}
</style>
</head>

<body>

<h2>Opportunities E-mobility Projects</h2>
<div id="kpis"></div>
<div id="performance"></div>
<div id="ranking"></div>
<div id="table"></div>

<script>

const metas = {
  "Bruno Reis": 50000000,
  "Felipe Hanker": 12000000
};

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub?gid=1937499442&single=true&output=csv";

function parseBR(v){
  if(!v) return 0;
  return Number(v.replace(/\./g,'').replace(',','.')) || 0;
}

function fmt(v){
  return 'R$ '+Math.round(v/1000).toLocaleString('pt-BR')+'k'
}

function statusColor(p){
  if(p >= 100) return "green"
  if(p >= 70) return "yellow"
  return "red"
}

function render(data){

let pipeline = 0
let ganhos = 0
let perdidos = 0
let vendedores = {}

data.forEach(o=>{
  const valor = parseBR(o["TOTAL NET (R$)"])
  pipeline += valor

  if(o["STATUS"]==="Ganho") ganhos++
  if(o["STATUS"]==="Perdido") perdidos++

  const v = o["VENDEDOR"]
  if(!v) return

  if(!vendedores[v]) vendedores[v]={pipeline:0}
  vendedores[v].pipeline += valor
})

document.getElementById("kpis").innerHTML = `
<div class="kpi">Pipeline<br><b>${fmt(pipeline)}</b></div>
<div class="kpi">Ganhos<br><b>${ganhos}</b></div>
<div class="kpi">Perdidos<br><b>${perdidos}</b></div>
`

let perf = "<h3>Performance</h3>"

Object.keys(metas).forEach(v=>{
  const pipe = vendedores[v]?.pipeline || 0
  const meta = metas[v]
  const ating = (pipe/meta)*100
  const gap = meta - pipe
  const cor = statusColor(ating)

  perf += `
  <div class="card">
    <b>${v}</b><br>
    Pipeline: ${fmt(pipe)}<br>
    Meta: ${fmt(meta)}<br>
    <span class="${cor}">Atingimento: ${ating.toFixed(1)}%</span><br>
    Gap: ${fmt(gap)}
  </div>
  `
})

document.getElementById("performance").innerHTML = perf

let ranking = Object.keys(vendedores)
.map(v=>({nome:v,pipeline:vendedores[v].pipeline}))
.sort((a,b)=>b.pipeline-a.pipeline)

let rankHTML = "<h3>Ranking</h3>"
ranking.forEach((r,i)=>{
  rankHTML += `<div>${i+1}. ${r.nome} - ${fmt(r.pipeline)}</div>`
})

document.getElementById("ranking").innerHTML = rankHTML

let table = "<h3>Oportunidades</h3><table><tr>"
Object.keys(data[0]).forEach(h=>{
  table += `<th>${h}</th>`
})
table += "</tr>"

data.slice(0,20).forEach(o=>{
  table += "<tr>"
  Object.values(o).forEach(v=>{
    table += `<td>${v}</td>`
  })
  table += "</tr>"
})

table += "</table>"

document.getElementById("table").innerHTML = table
}

Papa.parse(url,{
  download:true,
  header:true,
  skipEmptyLines:true,
  complete:function(results){
    render(results.data)
  }
})

</script>

</body>
</html>
