<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM E-Mobility · Direção · Livoltek</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A1628;--s1:#0F1E35;--s2:#152540;--s3:#1B2D4F;
  --br:rgba(255,255,255,.07);--br2:rgba(255,255,255,.04);
  --teal:#00D4E8;--teal-a:rgba(0,212,232,.1);
  --amber:#FFB347;--amber-a:rgba(255,179,71,.1);
  --green:#3DD68C;--green-a:rgba(61,214,140,.1);
  --red:#FF6B6B;--red-a:rgba(255,107,107,.1);
  --yellow:#FFD166;
  --v1:#00D4E8;--v1a:rgba(0,212,232,.12);
  --v2:#FFB347;--v2a:rgba(255,179,71,.12);
  --txt:#D8EAF5;--muted:#5B7A99;--muted2:#3D5A78;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --r:14px;--r2:10px;--r3:8px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);min-height:100vh}
.wrap{max-width:1440px;margin:0 auto;padding:28px 32px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--amber),#FF7A00);display:grid;place-items:center;font-size:20px;flex-shrink:0}
.hdr-title{font-family:var(--fh);font-size:1.35rem;font-weight:800;letter-spacing:-.02em}
.hdr-title span{color:var(--amber)}
.hdr-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid}
.chip-dir{color:var(--amber);border-color:rgba(255,179,71,.35);background:var(--amber-a)}
.chip-ok{color:var(--green);border-color:rgba(61,214,140,.3);background:var(--green-a)}
.chip-ld{color:var(--amber);border-color:rgba(255,179,71,.25);background:var(--amber-a)}
.chip-er{color:var(--red);border-color:rgba(255,107,107,.3);background:var(--red-a)}
.btn{padding:7px 14px;border-radius:var(--r3);font-size:.74rem;font-weight:600;cursor:pointer;font-family:var(--fb);border:1px solid;transition:opacity .2s;background:transparent}
.btn:hover{opacity:.75}
.btn-teal{color:var(--teal);border-color:rgba(0,212,232,.3)}
.btn-green{color:var(--green);border-color:rgba(61,214,140,.3)}

/* SECTION LABEL */
.slabel{font-family:var(--fh);font-size:.62rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.slabel::after{content:'';flex:1;height:1px;background:var(--br)}

/* KPI STRIP */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.kpi{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-t::after{background:var(--teal)}.kpi-a::after{background:var(--amber)}
.kpi-g::after{background:var(--green)}.kpi-r::after{background:var(--red)}
.kpi-lbl{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.kpi-val{font-family:var(--fh);font-size:1.45rem;font-weight:800;line-height:1}
.kpi-val.ct{color:var(--teal)}.kpi-val.ca{color:var(--amber)}
.kpi-val.cg{color:var(--green)}.kpi-val.cr{color:var(--red)}
.kpi-sub{font-size:.67rem;color:var(--muted);margin-top:5px}
.kpi-ico{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.6rem;opacity:.1}

/* VENDOR SPLIT */
.vendors{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.vendor-col{display:flex;flex-direction:column;gap:14px}
.vendor-hdr{display:flex;align-items:center;gap:10px;padding:16px 18px;background:var(--s1);border:1px solid var(--br);border-radius:var(--r)}
.vendor-avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:.8rem;flex-shrink:0}
.vendor-name{font-family:var(--fh);font-size:.95rem;font-weight:700}
.vendor-role{font-size:.68rem;color:var(--muted);margin-top:1px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:18px 20px}
.card-title{font-family:var(--fh);font-size:.72rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.card-title .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* VENDOR MINI KPIs */
.vkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.vkpi{background:var(--s2);border-radius:var(--r2);padding:12px 14px}
.vkpi-lbl{font-size:.63rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.vkpi-val{font-family:var(--fh);font-size:1rem;font-weight:700}
.vkpi-sub{font-size:.61rem;color:var(--muted);margin-top:2px}

/* PROGRESS */
.prog-lbl{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:5px}
.prog-track{height:4px;background:var(--s3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 1s ease}

/* CLOSING */
.closing-list{display:flex;flex-direction:column;gap:7px}
.closing-item{background:var(--s2);border-radius:var(--r2);padding:11px 13px;display:flex;align-items:center;gap:10px}
.closing-month{font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.closing-opp{font-size:.76rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.closing-val{font-size:.73rem;font-weight:700;white-space:nowrap}
.closing-prob{font-size:.63rem;color:var(--muted)}

/* TOP 10 */
.top10-list{display:flex;flex-direction:column;gap:5px}
.top10-item{background:var(--s2);border-radius:var(--r2);padding:10px 13px;display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:10px}
.t10-rank{font-family:var(--fh);font-size:.74rem;font-weight:800;color:var(--muted2);text-align:center}
.t10-rank.gold{color:#FFD700}.t10-rank.silver{color:#B0B8C4}.t10-rank.bronze{color:#CD8B4A}
.t10-opp{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t10-meta{font-size:.63rem;color:var(--muted);margin-top:1px}
.t10-right{text-align:right}
.t10-pond{font-size:.75rem;font-weight:700}
.t10-base{font-size:.62rem;color:var(--muted);margin-top:1px}

/* COMPARATIVO */
.comp-list{display:flex;flex-direction:column;gap:5px}
.comp-item{background:var(--s2);border-radius:var(--r2);padding:10px 13px;display:flex;align-items:center;gap:10px}
.comp-opp{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.comp-meta{font-size:.62rem;color:var(--muted);margin-top:1px}
.delta{font-size:.71rem;font-weight:700;white-space:nowrap}
.delta-up{color:var(--green)}.delta-dn{color:var(--red)}.delta-eq{color:var(--muted)}
.tag{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:700;white-space:nowrap}
.tag-new{background:var(--green-a);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.tag-lost{background:var(--red-a);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.comp-empty{text-align:center;padding:16px;font-size:.72rem;color:var(--muted2)}

/* BADGES */
.badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:700}
.b-lead{background:rgba(91,122,153,.2);color:#8AAAC5}
.b-prop{background:var(--amber-a);color:var(--amber)}
.b-neg{background:rgba(255,209,102,.12);color:var(--yellow)}
.b-fech{background:var(--green-a);color:var(--green)}
.b-ganho{background:rgba(61,214,140,.25);color:var(--green)}
.b-perd{background:var(--red-a);color:var(--red)}
.rb{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:.61rem;font-weight:700}
.rb-b{background:var(--green-a);color:var(--green)}
.rb-m{background:rgba(255,209,102,.1);color:var(--yellow)}
.rb-a{background:var(--red-a);color:var(--red)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center}
.ov.open{display:flex}
.md{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:28px;width:min(580px,90vw);position:relative}
.md h3{font-family:var(--fh);font-size:1rem;font-weight:700;margin-bottom:8px}
.md p{font-size:.76rem;color:var(--muted);line-height:1.65;margin-bottom:14px}
.md label{font-size:.72rem;color:var(--muted);display:block;margin-bottom:5px;margin-top:12px}
.md input{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:var(--r3);padding:9px 12px;color:var(--txt);font-size:.78rem;font-family:var(--fb);outline:none;transition:border .2s}
.md input:focus{border-color:var(--teal)}
.md-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.b-sv{background:var(--amber);border:none;border-radius:var(--r3);padding:9px 20px;color:#0A1628;font-weight:700;font-size:.78rem;cursor:pointer;font-family:var(--fb)}
.b-cn{background:transparent;border:1px solid var(--br);border-radius:var(--r3);padding:9px 16px;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:var(--fb)}
.md-x{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer}

.empty{text-align:center;padding:18px;font-size:.73rem;color:var(--muted2)}
.footer{text-align:center;margin-top:28px;padding-top:14px;border-top:1px solid var(--br);font-size:.66rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card,.kpi{animation:fadeUp .3s ease both}
</style>
</head>
<body>
<div class="wrap">

  <header class="hdr">
    <div class="hdr-l">
      <div class="hdr-icon">📊</div>
      <div>
        <div class="hdr-title">DIREÇÃO · <span>E-MOBILITY</span></div>
        <div class="hdr-sub">Livoltek Power Brasil · Visão Gerencial · 2026</div>
      </div>
    </div>
    <div class="hdr-r">
      <span class="chip chip-dir">🔐 Direção</span>
      <span id="sbadge" class="chip chip-ld">⟳ Carregando...</span>
      <button class="btn btn-green" onclick="loadAll()">↻ Atualizar</button>
      <button class="btn btn-teal" onclick="openCfg()">⚙ Fonte</button>
    </div>
  </header>

  <div id="mc"></div>
  <div class="footer">Livoltek Power Brasil · CRM E-Mobility 2026 · Atualização automática via Google Sheets</div>
</div>

<div class="ov" id="ov">
  <div class="md">
    <button class="md-x" onclick="closeCfg()">✕</button>
    <h3>⚙ Fonte de dados</h3>
    <p>Links CSV das abas BASE_GERAL e SNAPSHOTS. Os dashboards carregam automaticamente ao abrir.</p>
    <label>BASE_GERAL — link CSV</label>
    <input id="curl-base" type="text" placeholder="https://docs.google.com/...output=csv"/>
    <label>SNAPSHOTS — link CSV (comparativo semanal)</label>
    <input id="curl-snap" type="text" placeholder="https://docs.google.com/...gid=202441246&output=csv"/>
    <div class="md-btns">
      <button class="b-cn" onclick="closeCfg()">Cancelar</button>
      <button class="b-sv" onclick="saveLoad()">Salvar e carregar</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub?output=csv';
const SNAP_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrkAsblLjOQi2CMC8pxjoGRyLHnxYoB5TV5nMTA3fUjdB_ehsudQGUaUnlACpcN6kRDfyVE19_ghnf/pub?gid=202441246&output=csv';
const SK_BASE  = 'crm_dir_base_v2';
const SK_SNAP  = 'crm_dir_snap_v2';

const VENDEDORES = ['Bruno Reis','Felipe Hanker'];
const VCOL  = {'Bruno Reis':'#00D4E8','Felipe Hanker':'#FFB347'};
const VCOLA = {'Bruno Reis':'rgba(0,212,232,.12)','Felipe Hanker':'rgba(255,179,71,.12)'};
const META_PCT = {'Bruno Reis':0.5,'Felipe Hanker':1.0};

// ── MODAL ─────────────────────────────────────────────
function openCfg(){
  document.getElementById('curl-base').value=localStorage.getItem(SK_BASE)||BASE_URL;
  document.getElementById('curl-snap').value=localStorage.getItem(SK_SNAP)||SNAP_URL;
  document.getElementById('ov').classList.add('open');
}
function closeCfg(){document.getElementById('ov').classList.remove('open')}
async function saveLoad(){
  const b=document.getElementById('curl-base').value.trim();
  const s=document.getElementById('curl-snap').value.trim();
  if(b)localStorage.setItem(SK_BASE,b);
  if(s)localStorage.setItem(SK_SNAP,s);
  closeCfg();await loadAll();
}

// ── BADGE ─────────────────────────────────────────────
function badge(t,tx){
  const e=document.getElementById('sbadge');
  e.className='chip '+(t==='ok'?'chip-ok':t==='er'?'chip-er':'chip-ld');
  e.textContent=tx;
}

// ── CSV PARSER ────────────────────────────────────────
function parseCSV(txt){
  const lines=txt.trim().split('\n').filter(Boolean);
  if(lines.length<2)return[];
  const normH=s=>s.trim().replace(/"/g,'').toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[\s()\.\/%\-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  const hdrs=lines[0].split(',').map(normH);
  return lines.slice(1).map((ln,li)=>{
    const f=[];let c='',q=false;
    for(const ch of ln){
      if(ch==='"'){q=!q;continue}
      if(ch===','&&!q){f.push(c.trim());c='';continue}
      c+=ch;
    }
    f.push(c.trim());
    const o={_r:li+2};
    hdrs.forEach((h,i)=>{o[h]=(f[i]||'').replace(/"/g,'').trim();});
    return o;
  });
}
const g=(r,...ks)=>{for(const k of ks){if(r[k]!==undefined&&r[k]!=='')return r[k];}return '';};
const pN=s=>parseFloat((s||'0').replace(/[^\d.,-]/g,'').replace(',','.'))||0;

// ── MAP BASE ──────────────────────────────────────────
function mapBase(r){
  const v  =pN(g(r,'TOTAL_NET_R_','TOTAL_NET_RS','VALOR','VALUE'));
  const lvk=pN(g(r,'TOTAL_NET_LVK_R_','TOTAL_NET_LVK_RS'));
  const p  =parseFloat((g(r,'PROB','PROBABILIDADE')||'0').replace('%',''))||0;
  return{_r:r._r,
    id:g(r,'ID'),opp:g(r,'OPORTUNIDADE','OPP','OPPORTUNITY'),
    cliente:g(r,'CLIENTE','CUSTOMER','CLIENT'),
    vendedor:g(r,'VENDEDOR','SALESPERSON'),
    solution:g(r,'SOLUTION_BID','SOLUTION'),
    sign_date:g(r,'SIGN_DATE'),
    dt_fech:g(r,'DT_FECH','DATA_DE_FECHAMENTO','DT_PREV_FECH'),
    mkt_qty:parseFloat(g(r,'MKT_QTY'))||0,
    pct_hx:parseFloat((g(r,'_HX','HX')||'0').replace('%',''))||0,
    lvk_qty:parseFloat(g(r,'LVK_QTY'))||0,
    valor:v,lvk,prob:p>1?p/100:p,
    estagio:g(r,'ESTAGIO','STAGE'),status:g(r,'STATUS'),
    risco:g(r,'RISCO','RISK'),prox:g(r,'PROX_PASSO','PROX'),
  };
}

// ── MAP SNAP ──────────────────────────────────────────
function mapSnap(r){
  return{
    data_snap:g(r,'DATA_SNAPSHOT','DATA_SNAP'),
    id_opp:g(r,'ID_OPORTUNIDADE','ID_OPP','ID'),
    customer:g(r,'CUSTOMER','CLIENTE'),
    vendedor:g(r,'VENDEDOR'),
    lvk:pN(g(r,'TOTAL_NET_LVK_R_','TOTAL_NET_LVK_RS',' TOTAL_NET_LVK_R_ ')),
    estagio:g(r,'ESTAGIO','STAGE'),
    status:g(r,'STATUS'),risco:g(r,'RISCO'),
    prob:parseFloat((g(r,'PROBABILIDADE','PROB')||'0').replace('%',''))||0,
    prox:g(r,'PROX_PASSO','PROX_PASSO_'),
    dt_fech:g(r,'DATA_DE_FECHAMENTO','DT_FECH'),
    chave:g(r,'CHAVE'),status_ant:g(r,'STATUS_ANTERIOR'),
  };
}

// ── FETCH ─────────────────────────────────────────────
async function fetchCSV(url){
  try{
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(10000)});
    const j=await r.json();
    if(j.contents)return j.contents;
  }catch{}
  const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
  return r.text();
}

// ── LOAD ──────────────────────────────────────────────
async function loadAll(){
  badge('ld','⟳ Carregando...');
  const baseUrl=localStorage.getItem(SK_BASE)||BASE_URL;
  const snapUrl=localStorage.getItem(SK_SNAP)||SNAP_URL;
  try{
    const [baseTxt,snapTxt]=await Promise.all([
      fetchCSV(baseUrl),
      fetchCSV(snapUrl).catch(()=>''),
    ]);
    const base=parseCSV(baseTxt).map(mapBase).filter(r=>r.opp);
    const snap=snapTxt?parseCSV(snapTxt).map(mapSnap).filter(r=>r.id_opp):[];
    const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    badge('ok',`✓ ${ts} · ${base.length} oport.`);
    render(base,snap);
  }catch(e){
    console.error(e);
    badge('er','⚠ Erro ao carregar');
    document.getElementById('mc').innerHTML=`<div class="empty">Não foi possível carregar os dados. Verifique a conexão e clique em ↻ Atualizar.</div>`;
  }
}

// ── HELPERS ───────────────────────────────────────────
const fmt  =v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
const fmtk =v=>'R$ '+Math.round(v/1000).toLocaleString('pt-BR')+'k';
const normS=s=>(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

function eClass(e){
  const m={Lead:'b-lead',Proposta:'b-prop','Negociação':'b-neg',Negociacao:'b-neg',
           Fechamento:'b-fech',Ganho:'b-ganho',Perdido:'b-perd'};
  return m[normS(e)]||'b-lead';
}
function rBadge(r){
  const n=normS(r||'').toLowerCase();
  return`<span class="rb ${/alto/.test(n)?'rb-a':/medio/.test(n)?'rb-m':'rb-b'}">${r||'—'}</span>`;
}
const initials=name=>(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
function parseDate(s){
  if(!s)return null;
  s=s.replace(/\//g,'-');const p=s.split('-');if(p.length<3)return null;
  return p[0].length===4?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);
}
const isAberto=o=>{const st=(o.status||'').toLowerCase();return st===''||st==='aberto'||st==='open';};
function inNext3Mo(dtStr){
  const d=parseDate(dtStr);if(!d)return false;
  const now=new Date();
  const limit=new Date(now.getFullYear(),now.getMonth()+3,now.getDate());
  return d>=now&&d<=limit;
}
function moLabel(d){
  return d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})
    .replace(' de ','/').replace('.','').replace(/^\w/,c=>c.toUpperCase());
}

// ── RENDER ────────────────────────────────────────────
function render(data,snap){
  const ab=data.filter(isAberto);
  const pipeTot=ab.reduce((s,o)=>s+o.valor,0);
  const pipeLVK=ab.reduce((s,o)=>s+o.lvk,0);
  const metaPct=pipeTot>0?Math.round(pipeLVK/pipeTot*100):0;
  const altRisk=ab.filter(o=>/alto/i.test(normS(o.risco))).length;

  document.getElementById('mc').innerHTML=`
    <div class="slabel">Visão geral</div>
    <div class="kpi-row">
      <div class="kpi kpi-t">
        <div class="kpi-lbl">Pipeline Total</div>
        <div class="kpi-val ct">${fmtk(pipeTot)}</div>
        <div class="kpi-sub">${ab.length} oportunidades · TOTAL NET (R$)</div>
        <div class="kpi-ico">📡</div>
      </div>
      <div class="kpi kpi-a">
        <div class="kpi-lbl">Pipeline Livoltek</div>
        <div class="kpi-val ca">${fmtk(pipeLVK)}</div>
        <div class="kpi-sub">TOTAL NET LVK (R$)</div>
        <div class="kpi-ico">⚡</div>
      </div>
      <div class="kpi kpi-g">
        <div class="kpi-lbl">LVK / Total</div>
        <div class="kpi-val cg">${metaPct}%</div>
        <div class="kpi-sub">${fmtk(pipeLVK)} de ${fmtk(pipeTot)}</div>
        <div class="kpi-ico">🎯</div>
      </div>
      <div class="kpi kpi-r">
        <div class="kpi-lbl">Riscos altos</div>
        <div class="kpi-val cr">${altRisk}</div>
        <div class="kpi-sub">de ${ab.length} abertas</div>
        <div class="kpi-ico">⚠️</div>
      </div>
    </div>
    <div class="slabel">Por vendedor</div>
    <div class="vendors">${VENDEDORES.map(v=>renderVendor(v,ab,snap)).join('')}</div>`;
}

function renderVendor(v,ab,snap){
  const col=VCOL[v], cola=VCOLA[v];
  const vAb=ab.filter(o=>o.vendedor===v);
  const pipe=vAb.reduce((s,o)=>s+o.valor,0);
  const lvk =vAb.reduce((s,o)=>s+o.lvk,0);
  const mPct=META_PCT[v]??0.5;
  const metaLVK=lvk*mPct;
  const progPct=pipe>0?Math.min(100,Math.round(lvk/pipe*100)):0;

  // Top 10 por ponderado
  const top10=[...vAb].sort((a,b)=>(b.valor*b.prob)-(a.valor*a.prob)).slice(0,10);

  // Fechar em 3 meses por DT_FECH
  const closing=vAb.filter(o=>inNext3Mo(o.dt_fech))
    .sort((a,b)=>(parseDate(a.dt_fech)||0)-(parseDate(b.dt_fech)||0));

  // Comparativo — 2 últimas datas de snapshot deste vendedor
  const vSnap=snap.filter(r=>r.vendedor===v);
  const dates=[...new Set(vSnap.map(r=>r.data_snap).filter(Boolean))].sort().reverse();
  const [d1,d2]=dates; // latest, previous
  const snap1=vSnap.filter(r=>r.data_snap===d1);
  const snap2=vSnap.filter(r=>r.data_snap===d2);

  return`<div class="vendor-col">

    <div class="vendor-hdr">
      <div class="vendor-avatar" style="background:${cola};color:${col};border:2px solid ${col}33">${initials(v)}</div>
      <div style="flex:1">
        <div class="vendor-name" style="color:${col}">${v}</div>
        <div class="vendor-role">Meta LVK: ${mPct*100}% do TOTAL NET LVK</div>
      </div>
    </div>

    <!-- Mini KPIs -->
    <div class="vkpi-row">
      <div class="vkpi">
        <div class="vkpi-lbl">Pipeline Total</div>
        <div class="vkpi-val" style="color:${col}">${fmtk(pipe)}</div>
        <div class="vkpi-sub">${vAb.length} oportunidades</div>
      </div>
      <div class="vkpi">
        <div class="vkpi-lbl">Pipeline LVK</div>
        <div class="vkpi-val" style="color:var(--yellow)">${fmtk(lvk)}</div>
        <div class="vkpi-sub">Meta: ${fmtk(metaLVK)}</div>
      </div>
      <div class="vkpi">
        <div class="vkpi-lbl">LVK / Total</div>
        <div class="vkpi-val" style="color:${progPct>=50?'var(--green)':'var(--amber)'}">${progPct}%</div>
        <div class="vkpi-sub">Proporção LVK</div>
      </div>
    </div>
    <div style="margin-bottom:4px">
      <div class="prog-lbl"><span>LVK vs Pipeline Total</span><span style="color:${col}">${progPct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${progPct}%;background:${col}"></div></div>
    </div>

    <!-- Fechar em 3 meses -->
    <div class="card">
      <div class="card-title">
        <span class="dot" style="background:var(--amber)"></span>
        Fechamentos — próximos 3 meses
        <span style="margin-left:auto;font-weight:400">${closing.length} oport.</span>
      </div>
      ${closing.length===0
        ?`<div class="empty">Nenhum fechamento previsto nos próximos 3 meses</div>`
        :`<div class="closing-list">${closing.map(o=>renderClosingItem(o,col)).join('')}</div>`}
    </div>

    <!-- Top 10 -->
    <div class="card">
      <div class="card-title">
        <span class="dot" style="background:var(--teal)"></span>
        Top 10 oportunidades-chave
        <span style="margin-left:auto;font-weight:400">por valor ponderado</span>
      </div>
      <div class="top10-list">${top10.map((o,i)=>renderTop10Item(o,i)).join('')}</div>
    </div>

    <!-- Comparativo semanal -->
    <div class="card">
      <div class="card-title">
        <span class="dot" style="background:var(--green)"></span>
        Comparativo semanal
        <span style="margin-left:auto;font-weight:400;font-size:.61rem">${d2||'—'} → ${d1||'sem dados'}</span>
      </div>
      ${renderComp(snap1,snap2,d1)}
    </div>

  </div>`;
}

// ── CLOSING ITEM ──────────────────────────────────────
function renderClosingItem(o,col){
  const d=parseDate(o.dt_fech);
  const now=new Date();
  const days=d?Math.round((d-now)/(864e5)):null;
  const urg=days!==null&&days<=30?'var(--red)':days<=60?'var(--amber)':col;
  const mo=d?moLabel(d):'—';
  return`<div class="closing-item">
    <span class="closing-month" style="background:${urg}1A;color:${urg}">${mo}</span>
    <div style="flex:1;min-width:0">
      <div class="closing-opp">${o.opp||'—'}</div>
      <div style="font-size:.63rem;color:var(--muted);margin-top:2px">${o.cliente||'—'} · ${rBadge(o.risco)}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="closing-val" style="color:${urg}">${fmt(o.valor)}</div>
      <div class="closing-prob">${Math.round(o.prob*100)}% prob · ${days!==null?days+'d':''}</div>
    </div>
  </div>`;
}

// ── TOP 10 ITEM ───────────────────────────────────────
function renderTop10Item(o,i){
  const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
  return`<div class="top10-item">
    <div class="t10-rank ${rankClass}">${i+1}</div>
    <div style="min-width:0">
      <div class="t10-opp">${o.opp||'—'}</div>
      <div class="t10-meta">${o.cliente||'—'} · <span class="badge ${eClass(o.estagio)}">${o.estagio||'—'}</span> · ${rBadge(o.risco)}</div>
    </div>
    <div class="t10-right">
      <div class="t10-pond">${fmt(o.valor*o.prob)}</div>
      <div class="t10-base">${fmt(o.valor)} · ${Math.round(o.prob*100)}%</div>
    </div>
  </div>`;
}

// ── COMPARATIVO ───────────────────────────────────────
function renderComp(snap1,snap2,d1){
  if(!d1||snap1.length===0)return`<div class="comp-empty">Nenhum snapshot disponível</div>`;

  const prevMap={};snap2.forEach(r=>{prevMap[r.id_opp]=r;});
  const newOpps  =snap1.filter(r=>!prevMap[r.id_opp]);
  const changed  =snap1.filter(r=>prevMap[r.id_opp]);
  const lostOpps =snap2.filter(r=>!snap1.find(l=>l.id_opp===r.id_opp));

  const withChange=changed.filter(r=>{
    const p=prevMap[r.id_opp];
    return r.estagio!==p.estagio||Math.abs(r.lvk-p.lvk)>100||r.prob!==p.prob||r.status!==p.status;
  });

  let html='<div class="comp-list">';

  newOpps.forEach(r=>{
    html+=`<div class="comp-item">
      <div style="flex:1;min-width:0">
        <div class="comp-opp">${r.customer||r.id_opp||'—'}</div>
        <div class="comp-meta">Nova oportunidade · ${fmt(r.lvk)}</div>
      </div>
      <span class="tag tag-new">+ Nova</span>
    </div>`;
  });

  withChange.forEach(r=>{
    const p=prevMap[r.id_opp];
    const stageChg=normS(r.estagio)!==normS(p.estagio);
    const valDelta=r.lvk-p.lvk;
    const probChg=r.prob!==p.prob;
    const dc=valDelta>0?'delta-up':valDelta<0?'delta-dn':'delta-eq';
    const da=valDelta>0?'↑':valDelta<0?'↓':'→';
    html+=`<div class="comp-item">
      <div style="flex:1;min-width:0">
        <div class="comp-opp">${r.customer||r.id_opp||'—'}</div>
        <div class="comp-meta">
          ${stageChg?`<span class="badge ${eClass(p.estagio)}">${p.estagio||'—'}</span> → <span class="badge ${eClass(r.estagio)}">${r.estagio||'—'}</span>`:`<span class="badge ${eClass(r.estagio)}">${r.estagio||'—'}</span>`}
          ${probChg?` · ${p.prob}% → ${r.prob}%`:''}
        </div>
      </div>
      <div class="delta ${dc}">${da}${valDelta!==0?' '+fmt(Math.abs(valDelta)):''}</div>
    </div>`;
  });

  lostOpps.forEach(r=>{
    html+=`<div class="comp-item">
      <div style="flex:1;min-width:0">
        <div class="comp-opp" style="color:var(--muted)">${r.customer||r.id_opp||'—'}</div>
        <div class="comp-meta">Saiu do pipeline · ${fmt(r.lvk)}</div>
      </div>
      <span class="tag tag-lost">− Saiu</span>
    </div>`;
  });

  const noChg=changed.length-withChange.length;
  if(newOpps.length===0&&withChange.length===0&&lostOpps.length===0){
    html+=`<div class="comp-empty">Sem alterações desde a semana anterior</div>`;
  } else if(noChg>0){
    html+=`<div class="comp-empty" style="padding:10px 0 0">${noChg} oportunidade${noChg!==1?'s':''} sem alteração</div>`;
  }

  html+='</div>';
  return html;
}

// ── INIT ──────────────────────────────────────────────
(async()=>{
  if(!localStorage.getItem(SK_BASE))localStorage.setItem(SK_BASE,BASE_URL);
  if(!localStorage.getItem(SK_SNAP))localStorage.setItem(SK_SNAP,SNAP_URL);
  await loadAll();
})();
</script>
